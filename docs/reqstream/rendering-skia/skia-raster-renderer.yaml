---
# DemaConsulting.Rendering.Skia - SkiaRasterRenderer Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the SkiaRasterRenderer unit: the shared SkiaSharp rasterizer that
#   draws placed layout-tree nodes to a bitmap before concrete format renderers encode it.
# - These unit requirements decompose the Rendering-Skia-RenderRasterImage system requirement
#   declared in rendering-skia.yaml.

sections:
  - title: SkiaRasterRenderer Unit Requirements
    requirements:
      - id: Rendering-Skia-SkiaRasterRenderer-DrawsLayoutTree
        title: >-
          SkiaRasterRenderer shall rasterize every layout-tree node kind - boxes, labels, lines,
          ports, badges, bands, lifelines, activations, and grids - onto a bitmap initialized with
          the render theme's background color.
        justification: |
          The base rasterizer draws all node kinds so that every concrete format renderer produces
          a complete diagram; the theme background makes the output usable in formats without
          transparency, such as JPEG, while keeping the canvas fill, hollow-marker occlusion, and
          midpoint-label backplates consistent under non-white themes.
        tests:
          - PngRenderer_Render_SingleBox_ProducesNonEmptyOutput
          - PngRenderer_Render_BackgroundIsThemeBackground
          - PngRenderer_Render_SingleLine_PixelOnLineIsStrokeColor
          - PngRenderer_Render_SinglePort_CenterPixelIsStrokeColor
          - PngRenderer_Render_SingleBadge_FilledCircle_CenterPixelIsStrokeColor
          - PngRenderer_Render_SingleLifeline_StemPixelIsStrokeColor
          - PngRenderer_Render_SingleActivation_CenterPixelIsWhite
          - PngRenderer_Render_SingleBand_BorderIsStrokeColor
          - PngRenderer_Render_DeeplyNestedBoxes_DoesNotStackOverflow
          - PngRenderer_Render_LabelWithXmlSpecialCharacters_ProducesValidPng

      - id: Rendering-Skia-SkiaRasterRenderer-ThemeColours
        title: >-
          SkiaRasterRenderer shall derive box and grid fill colours from the render theme, indexing
          the depth-fill palette by nesting depth.
        justification: |
          Deriving colours from the theme keeps raster output visually consistent with the SVG
          renderer and lets callers restyle diagrams by supplying a different theme.
        tests:
          - PngRenderer_Render_SingleBox_FillColorMatchesTheme
          - PngRenderer_Render_SingleBox_DepthOneUsesSecondColor
          - PngRenderer_Render_SingleGrid_HeaderFillMatchesTheme

      - id: Rendering-Skia-SkiaRasterRenderer-EndMarkers
        title: >-
          SkiaRasterRenderer shall draw connector end markers whose geometry derives from the shared
          notation metrics, so raster markers match the SVG markers.
        justification: |
          End markers express relationship direction and kind; sharing the notation metrics with the
          SVG renderer keeps the two output formats visually identical.
        tests:
          - FilledArrow_AlongLength_MatchesNotationMetrics
          - FilledArrow_BaseWidth_MatchesNotationMetrics
          - OpenChevron_HasFewerInkPixelsThanClosedTriangle
          - PngRenderer_Render_DrawArrowhead_OpenWithCrossbar_ProducesNonEmptyOutput

      - id: Rendering-Skia-SkiaRasterRenderer-EmptyTree
        title: >-
          SkiaRasterRenderer shall render an empty layout tree to a valid image with a minimum
          bitmap size of one by one pixels.
        justification: |
          Enforcing a minimum bitmap size prevents SkiaSharp allocation errors for empty diagrams,
          so callers never have to special-case an empty layout.
        tests:
          - PngRenderer_Render_EmptyTree_WritesPngSignature
