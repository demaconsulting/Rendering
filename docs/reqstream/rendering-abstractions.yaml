---
# DemaConsulting.Rendering.Abstractions System Requirements
#
# PURPOSE:
# - Define the SYSTEM-level requirements for the DemaConsulting.Rendering.Abstractions system: the
#   service provider interface (SPI) that sits between the rendering model and the concrete layout
#   and renderer implementations.
# - Each system requirement decomposes downward (children) into unit requirements in the per-unit
#   sibling files:
#     - rendering-contracts.yaml      (ILayoutAlgorithm, IRenderer, RenderOptions, RenderOutput)
#     - registries.yaml               (LayoutAlgorithmRegistry, RendererRegistry)
#     - theme.yaml                    (Theme and built-in Themes)
#     - notation-metrics.yaml         (shared notation geometry)
#     - box-metrics.yaml              (box title-area and folder-tab geometry)
#     - connector-label-placer.yaml   (connector midpoint-label placement)
#     - port-label-width-estimator.yaml (shared port-label natural-width estimation)

sections:
  - title: Rendering Abstractions Requirements
    requirements:
      - id: Rendering-Abstractions-Extensibility-Contracts
        title: >-
          The abstractions system shall define pluggable layout-algorithm and renderer contracts.
        justification: |
          An ELK-inspired provider model lets additional layout families and output formats be
          introduced purely additively - a new implementation is written against the stable
          contracts, and no existing contract changes are required.
        children:
          - Rendering-Abstractions-Contracts-AlgorithmIdentifier
          - Rendering-Abstractions-Contracts-AlgorithmApply
          - Rendering-Abstractions-Contracts-RendererIdentity
          - Rendering-Abstractions-Contracts-RendererWrite
        tests:
          - LayoutAlgorithmRegistry_RegisterThenResolve_ReturnsAlgorithm
          - RendererRegistry_RegisterThenResolve_ReturnsRenderer

      - id: Rendering-Abstractions-Extensibility-Registries
        title: >-
          The abstractions system shall provide registries that select an implementation by
          identifier or media type.
        justification: |
          Consumers resolve the implementation they need at run time, so the abstractions layer must
          provide lookup services that map algorithm ids and renderer metadata to registered
          implementations without changing the contracts.
        children:
          - Rendering-Abstractions-Registries-ResolveAlgorithm
          - Rendering-Abstractions-Registries-ResolveRenderer
          - Rendering-Abstractions-Registries-ResolveRendererByExtension
          - Rendering-Abstractions-Registries-MissingThrows
        tests:
          - LayoutAlgorithmRegistry_RegisterThenResolve_ReturnsAlgorithm
          - RendererRegistry_RegisterThenResolve_ReturnsRenderer

      - id: Rendering-Abstractions-Theming-Model
        title: >-
          The abstractions system shall define a visual theme model with built-in themes.
        justification: |
          Centralizing colors, fonts, and line metrics in a theme lets a single layout be rendered
          in different visual styles while keeping the built-in themes consistent and reusable.
        children:
          - Rendering-Abstractions-Theme-BuiltInGeometry
        tests:
          - Themes_HaveExpectedConnectorGeometry

      - id: Rendering-Abstractions-Theming-ApproachGeometry
        title: >-
          The abstractions system shall derive connector approach geometry from theme values.
        justification: |
          Deriving the connector approach zone from theme values keeps the space reserved by layout
          consistent with the space drawn by renderers.
        children:
          - Rendering-Abstractions-Theme-ApproachZone
        tests:
          - ConnectorApproachZone_SumsStubBendAndClearance

      - id: Rendering-Abstractions-SharedGeometry-Notation
        title: >-
          The abstractions system shall provide single-source notation geometry so every renderer
          draws identical connector decorations and badges.
        justification: |
          When every renderer reads one source of notation geometry, marker and badge dimensions
          match exactly and notation literals never have to be duplicated across the rendering path.
        children:
          - Rendering-Abstractions-NotationMetrics-TriangleDimensions
          - Rendering-Abstractions-NotationMetrics-TriangleApexOvershoot
          - Rendering-Abstractions-NotationMetrics-DiamondDimensions
          - Rendering-Abstractions-NotationMetrics-DiamondFarPointOnEndpoint
          - Rendering-Abstractions-NotationMetrics-CircleBarGeometry
          - Rendering-Abstractions-NotationMetrics-Crossbar
          - Rendering-Abstractions-NotationMetrics-AlongLineLength
          - Rendering-Abstractions-NotationMetrics-PortSquare
          - Rendering-Abstractions-NotationMetrics-FolderTab
          - Rendering-Abstractions-NotationMetrics-NoteFold
          - Rendering-Abstractions-NotationMetrics-RoundedRectCorner
          - Rendering-Abstractions-NotationMetrics-RejectNullTheme
          - Rendering-Abstractions-NotationMetrics-Badge
          - Rendering-Abstractions-NotationMetrics-LabelBackground
        tests:
          - TriangleFamily_HasCanonicalValues

      - id: Rendering-Abstractions-SharedGeometry-Box
        title: >-
          The abstractions system shall provide single-source box geometry so renderers reserve
          consistent title-area and folder-tab space.
        justification: |
          Shared box geometry keeps title bars and folder tabs consistent across renderers and
          prevents duplicated box-sizing literals.
        children:
          - Rendering-Abstractions-BoxMetrics-FolderTabHeight
          - Rendering-Abstractions-BoxMetrics-TitleAreaHeight
          - Rendering-Abstractions-BoxMetrics-RejectNullTheme
        tests:
          - BoxMetrics_FolderTabHeight_DerivesFromThemeBodyFontAndPadding

      - id: Rendering-Abstractions-SharedGeometry-ConnectorLabel
        title: >-
          The abstractions system shall provide single-source connector-label geometry so renderers
          place labels consistently on routed connectors.
        justification: |
          Shared connector-label geometry keeps label placement consistent across renderers and
          prevents each renderer from re-implementing midpoint and overlap rules.
        children:
          - Rendering-Abstractions-ConnectorLabelPlacer-OmitUnlabelled
          - Rendering-Abstractions-ConnectorLabelPlacer-LongestSegment
          - Rendering-Abstractions-ConnectorLabelPlacer-AvoidOverlap
        tests:
          - Place_SingleLine_UsesLongestSegmentMidpoint

      - id: Rendering-Abstractions-SharedGeometry-PortLabelWidth
        title: >-
          The abstractions system shall provide single-source port-label natural-width estimation so
          the layout engine and every renderer agree on when a port label needs a squeeze constraint.
        justification: |
          The layout engine sizes a port's MaxLabelWidth from an estimate of the label's natural
          width; if a renderer's own squeeze decision used a different estimate, the two could
          disagree even when the layout engine's own measurement says the label fits exactly. A
          single shared estimator eliminates that class of disagreement.
        children:
          - Rendering-Abstractions-PortLabelWidthEstimator-MeasureWidth
          - Rendering-Abstractions-PortLabelWidthEstimator-EmptyText
          - Rendering-Abstractions-PortLabelWidthEstimator-UnknownCharacterFallback
          - Rendering-Abstractions-PortLabelWidthEstimator-RejectNullText
        tests:
          - MeasureWidth_ScalesLinearlyWithFontSize
