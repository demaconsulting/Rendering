---
# SkiaSharp OTS Software Requirements
#
# Requirements for the SkiaSharp raster-graphics library functionality.
#
# Unlike the DemaConsulting tool OTS items (BuildMark, ReviewMark, ...) which are verified by their
# own self-validation TRX, and like xUnit, SkiaSharp is a runtime library rather than build/compliance
# tooling: its OTS requirements are satisfied by this repository's own renderer tests, which xUnit
# discovers, executes, and records into the TRX result files that ReqStream traces. The linked tests
# below are a stable, representative sample spanning bitmap drawing, text rendering, and image
# encoding.

sections:
  - title: OTS Software Requirements
    sections:
      - title: SkiaSharp Requirements
        requirements:
          - id: Rendering-OTS-SkiaSharp-Rasterize
            title: SkiaSharp shall draw shapes and lines onto a bitmap canvas.
            justification: |
              SkiaSharp's SKBitmap and SKCanvas provide the in-memory raster surface, and SKPaint
              provides filled/stroked shape drawing, that SkiaRasterRenderer uses to draw layout
              boxes and connector lines. Passing tests that sample drawn pixels confirm these
              primitives operate correctly.
            tags: [ots]
            tests:
              - Render_SingleBox_ProducesPngSignature
              - PngRenderer_Render_SingleLine_PixelOnLineIsStrokeColor
          - id: Rendering-OTS-SkiaSharp-Text
            title: SkiaSharp shall render text using loaded typefaces.
            justification: |
              SkiaSharp's SKTypeface loads the embedded Noto Sans font resources, and SKPaint's
              text APIs draw node titles and labels with them. A passing test that renders a label
              containing special characters confirms typeface loading and text drawing operate
              correctly.
            tags: [ots]
            tests:
              - PngRenderer_Render_LabelWithXmlSpecialCharacters_ProducesValidPng
          - id: Rendering-OTS-SkiaSharp-Encode
            title: SkiaSharp shall encode a drawn bitmap into PNG, JPEG, and WEBP image formats.
            justification: |
              SkiaSharp's image encoders convert the drawn SKBitmap into the target container
              format for each concrete renderer. Passing tests that check each format's signature
              bytes confirm the encoders produce valid output.
            tags: [ots]
            tests:
              - Render_SingleBox_ProducesPngSignature
              - JpegRenderer_Render_ProducesJpegSignature
              - WebpRenderer_Render_ProducesWebpContainerHeader
