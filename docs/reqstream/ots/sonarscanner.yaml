---
# SonarScanner for .NET OTS Software Requirements
#
# Requirements for the SonarScanner for .NET static-analysis scanner functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: SonarScanner for .NET Requirements
        requirements:
          - id: Rendering-OTS-SonarScanner
            title: SonarScanner for .NET shall analyze the build and publish results to SonarCloud.
            justification: |
              The dotnet-sonarscanner local tool wraps the build with begin/end analysis steps that
              upload source metrics, coverage, and issues to SonarCloud. It runs in the same CI
              pipeline that produces the TRX test results consumed by SonarMark, so a successful
              pipeline run is evidence that SonarScanner for .NET executed without error.
            tags: [ots]
            tests:
              - SonarScanner_BeginAnalysis
              - SonarScanner_EndAnalysisPublishesResults
