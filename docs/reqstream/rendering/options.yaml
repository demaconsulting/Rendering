---
# DemaConsulting.Rendering (Model) - Options Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the options unit: the open, ELK-inspired property-based
#   configuration system (LayoutProperty, IPropertyHolder, PropertyHolder, LayoutOptions,
#   CoreOptions, and the option enums).
# - These unit requirements decompose the Rendering-Model-Configuration system requirement
#   declared in rendering.yaml.

sections:
  - title: Options Requirements
    requirements:
      - id: Rendering-Model-Options-Default
        title: >-
          Reading a property that has not been set on a holder shall return that property's declared
          default value.
        justification: |
          Declared defaults let algorithms and renderers read any option unconditionally, without
          each caller having to pre-populate every option first.
        tests:
          - Get_UnsetProperty_ReturnsDefault

      - id: Rendering-Model-Options-StoreAndRetrieve
        title: >-
          A value written for a property shall be returned by a subsequent read of that same
          property.
        justification: |
          Storing and retrieving option values is the core of the configuration system: callers set
          the options they care about and algorithms read them back reliably.
        tests:
          - Get_AfterSet_ReturnsStoredValue

      - id: Rendering-Model-Options-Contains
        title: >-
          A property holder shall report whether a given property has been explicitly set.
        justification: |
          Distinguishing an explicitly-set value from a default lets an algorithm honor an override
          only when a caller actually supplied one.
        tests:
          - Contains_ReflectsExplicitSet

      - id: Rendering-Model-Options-TryGet
        title: >-
          An attempt to read an unset property shall report that no value was set and shall yield the
          declared default.
        justification: |
          A combined test-and-read operation lets a caller branch on whether an override exists while
          still receiving a usable default in a single call.
        tests:
          - TryGet_UnsetProperty_ReturnsFalseAndDefault

      - id: Rendering-Model-Options-Cascade
        title: >-
          Overlaying one property holder onto another shall yield a snapshot where the overlaying
          holder's explicitly-set values take precedence and the base holder's other explicitly-set
          values pass through unchanged, for any property including ones not known in advance.
        justification: |
          This is the generic primitive the whole per-scope option cascading model depends on: a caller
          resolving a nested scope's effective options overlays each level's own overrides onto its
          parent's already-resolved snapshot, nearest-ancestor-wins, without needing to know which
          properties exist. Testing it once at the model level lets every current and future
          scope-cascading consumer (for example HierarchicalLayoutAlgorithm) rely on it without a
          bespoke test per property.
        tests:
          - OverlayOnto_EmptyHolderOntoPopulatedParent_ReturnsParentValuesUnchanged
          - OverlayOnto_HolderOverridesProperty_HolderValueWins
          - OverlayOnto_ValueOnlyOnParent_PassesThrough
          - OverlayOnto_CustomPropertyNotInCoreOptions_IsMerged
          - OverlayOnto_NullParent_ThrowsArgumentNullException

      - id: Rendering-Model-Options-MergeParallelEdges
        title: >-
          CoreOptions.MergeParallelEdges shall default to true, exactly reproducing the layered
          algorithm's original unconditional deduplication of parallel edges, and shall cascade like
          every other property when explicitly set on a graph or options scope.
        justification: |
          A caller of the bundled layered algorithm (for example an interconnection/wiring-diagram
          view) needs a way to opt out of parallel-edge collapsing without affecting any existing
          consumer's default rendering, so the default must exactly match today's fixed behavior.
        tests:
          - MergeParallelEdges_DefaultValue_IsTrue
          - MergeParallelEdges_SetOnGraph_ReadsBackExplicitValue

      - id: Rendering-Model-Options-AssumedFontSize
        title: >-
          CoreOptions.AssumedFontSize shall default to 12.0, matching the bundled themes' FontSizeBody,
          and shall cascade like every other property when explicitly set.
        justification: |
          A text measurer consulted at layout time needs a font size up front, before any renderer's
          own theme is available; defaulting to the bundled themes' own body font size keeps the
          reserved margin accurate for a caller that never overrides either value.
        tests:
          - AssumedFontSize_DefaultValue_Is12
          - AssumedFontSize_SetOnOptions_ReadsBackExplicitValue

      - id: Rendering-Model-Options-TextMeasurer
        title: >-
          CoreOptions.TextMeasurer shall default to null (signaling that no caller-supplied measurer is
          configured, so a consumer falls back to its own dependency-free heuristic), and shall cascade
          the same configured instance like every other property when explicitly set.
        justification: |
          Wiring a real, font-accurate measurer (for example the Skia-backed implementation) is
          optional: a caller that never references Skia at all must still get automatic, reasonable
          behavior with zero required setup.
        tests:
          - TextMeasurer_DefaultValue_IsNull
          - TextMeasurer_SetOnGraph_ReadsBackSameInstance

      - id: Rendering-Model-Options-TextMeasurerContract
        title: >-
          ITextMeasurer implementations shall report a text's measured width for a given font size,
          bold flag, and italic flag, with a wider or longer string, or a larger font size, always
          measuring at least as wide.
        justification: |
          LayeredLayoutAlgorithm's reserved-margin computation (ContentInsetLeft/Right) depends on a
          consistent measurement contract that holds for both the dependency-free heuristic fallback
          and the Skia-backed implementation, so a caller can swap one for the other without changing
          the shape of the reserved margin.
        tests:
          - MeasureWidth_ScalesLinearlyWithTextLength
          - MeasureWidth_MatchesDocumentedGlyphWidthFactor
          - MeasureWidth_EmptyString_ReturnsZero
          - MeasureWidth_BoldItalicFlags_DoNotChangeEstimate
          - MeasureWidth_LongerText_MeasuresWider
          - MeasureWidth_LargerFontSize_MeasuresWider
          - MeasureWidth_NullText_ThrowsArgumentNullException
          - MeasureWidth_Bold_UsesDistinctTypefaceFromRegular
