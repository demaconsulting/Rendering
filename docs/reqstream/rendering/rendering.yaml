---
# DemaConsulting.Rendering (Model) Requirements
#
# PURPOSE:
# - Define the requirements for the DemaConsulting.Rendering system: the SysML-agnostic
#   rendering model that provides the placed layout-tree intermediate representation, the
#   open (ELK-inspired) property-based option system, and the unplaced input layout graph.
# - The first section holds system-level requirements. Each system requirement decomposes
#   downward (children) into the unit requirements that provide the detailed behavior.
# - The remaining sections hold the unit requirements for the three units of this system:
#   layout-tree (the IR records), options (the property system), and layout-graph (the input model).
#
# SCOPE EXCLUSIONS:
# - The following public members are optional presentation or diagnostic metadata carried through
#   unchanged by the model. They carry no algorithmic behavior of their own, and the rendered
#   behavior they influence is specified and verified in the
#   renderer systems (DemaConsulting.Rendering.Svg / DemaConsulting.Rendering.Skia), not in the
#   model. They are therefore intentionally excluded from the Rendering-Model requirement set and
#   are not given individual functional requirements:
#     - LayoutBox.Keyword          - optional SysML keyword text drawn above the box label
#     - LayoutTree.Warnings        - non-fatal layout-quality diagnostics (advisory only)
#     - LayoutGraphNode.Label      - optional input-node display text
#     - LayoutGraphEdge.Label      - optional input-edge midpoint display text
#     - LayoutGraphEdge.TargetEnd  - optional input-edge end-marker style hint
#     - LayoutGraphEdge.LineStyle  - optional input-edge stroke-style hint

sections:
  - title: Rendering Model System Requirements
    requirements:
      - id: Rendering-Model-LayoutTree
        title: >-
          The rendering model shall provide a placed layout-tree representation that carries every
          diagram element type with absolute coordinates ready for a renderer to draw.
        justification: |
          Separating a placed, renderer-agnostic intermediate representation from the layout
          algorithms and the renderers lets a single layout be drawn to any output format (SVG,
          PNG) without re-computing geometry, and lets new element types be added additively.
        children:
          - Rendering-Model-LayoutTree-Canvas
          - Rendering-Model-LayoutTree-AbsoluteCoordinates
          - Rendering-Model-LayoutTree-Box
          - Rendering-Model-LayoutTree-DepthNotColor
          - Rendering-Model-LayoutTree-Port
          - Rendering-Model-LayoutTree-Line
          - Rendering-Model-LayoutTree-Label
          - Rendering-Model-LayoutTree-Badge
          - Rendering-Model-LayoutTree-Band
          - Rendering-Model-LayoutTree-Lifeline
          - Rendering-Model-LayoutTree-Activation
          - Rendering-Model-LayoutTree-Grid
        tests:
          - LayoutTree_Construction_StoresWidthHeightNodes
          - LayoutBox_Construction_StoresAllFields

      - id: Rendering-Model-Configuration
        title: >-
          The rendering model shall provide an open, strongly-typed configuration system that
          carries options at graph, element, and standalone scope without changing any contract.
        justification: |
          An ELK-inspired open property system lets configuration coverage grow purely additively:
          new options are introduced by declaring new keys, so the layout and rendering contracts
          never change signature and unknown options are carried harmlessly.
        children:
          - Rendering-Model-Options-Default
          - Rendering-Model-Options-StoreAndRetrieve
          - Rendering-Model-Options-Contains
          - Rendering-Model-Options-TryGet
        tests:
          - Get_UnsetProperty_ReturnsDefault
          - Get_AfterSet_ReturnsStoredValue

      - id: Rendering-Model-InputGraph
        title: >-
          The rendering model shall provide an unplaced input-graph representation of sized nodes
          and directed edges that a layout algorithm consumes to produce a placed layout tree.
        justification: |
          A distinct input model lets callers describe what is to be laid out (boxes and their
          connections) independently of how any algorithm places them, and lets configuration be
          attached to the whole graph or to individual elements.
        children:
          - Rendering-Model-LayoutGraph-AddNode
          - Rendering-Model-LayoutGraph-AddEdge
          - Rendering-Model-LayoutGraph-PerElementProperties
          - Rendering-Model-LayoutGraph-ContainerNodes
          - Rendering-Model-LayoutGraph-ScopedIdentifiers
          - Rendering-Model-LayoutGraph-CrossContainerEdge
        tests:
          - AddNode_AppendsNodeAndReturnsIt
          - AddEdge_AppendsEdgeWithEndpoints

  - title: Layout Tree Unit Requirements
    requirements:
      - id: Rendering-Model-LayoutTree-Canvas
        title: >-
          The layout tree shall carry the canvas width, the canvas height, and the ordered list of
          top-level nodes that make up a rendered view.
        justification: |
          A renderer needs the overall canvas size to establish the drawing surface and needs the
          ordered node list to draw every element of the view.
        tests:
          - LayoutTree_Construction_StoresWidthHeightNodes

      - id: Rendering-Model-LayoutTree-AbsoluteCoordinates
        title: >-
          Every positioned node shall carry absolute coordinates that are preserved without any
          further transformation being applied by the model.
        justification: |
          Absolute coordinates let a renderer draw each element directly from the tree without
          resolving nested offsets, which keeps renderers simple and their output deterministic.
        tests:
          - LayoutBox_Coordinates_AreAbsolute
          - LayoutPort_Coordinates_AreAbsolute
          - LayoutLine_Waypoints_AreAbsolute

      - id: Rendering-Model-LayoutTree-Box
        title: >-
          A box node shall carry its position, size, optional label, nesting depth, shape, ordered
          compartments, and nested child nodes.
        justification: |
          Boxes are the primary container element; carrying compartments and children lets the
          model represent nested definitions and usages that renderers draw recursively.
        tests:
          - LayoutBox_Construction_StoresAllFields
          - LayoutBox_Children_ContainsNestedNodes

      - id: Rendering-Model-LayoutTree-DepthNotColor
        title: >-
          A box node shall express its visual nesting as an integer depth rather than a resolved
          color.
        justification: |
          Storing depth rather than a color keeps the model free of theme decisions, so the theme
          in effect at render time selects the fill color for each nesting level.
        tests:
          - LayoutBox_Depth_IsInteger

      - id: Rendering-Model-LayoutTree-Port
        title: >-
          A port node shall carry its absolute centre, the box edge it is attached to, and an
          optional label.
        justification: |
          Ports pin connection points to box edges; carrying the attached side lets a renderer
          offset the port symbol and its label away from the box face correctly.
        tests:
          - LayoutPort_Construction_StoresAllFields

      - id: Rendering-Model-LayoutTree-Line
        title: >-
          A connector line node shall carry its ordered waypoints, its source and target end-marker
          styles, its stroke style, and an optional midpoint label.
        justification: |
          Connectors express relationships; carrying pre-routed waypoints, end markers, and stroke
          style lets a renderer draw the connector and its decorations without re-routing.
        tests:
          - LayoutLine_Construction_StoresAllFields

      - id: Rendering-Model-LayoutTree-Label
        title: >-
          A label node shall carry its position, maximum width, text, alignment, font weight, font
          style, and font size.
        justification: |
          Standalone labels carry names and annotations; carrying explicit font styling and a
          maximum width lets a renderer emphasize and fit text consistently.
        tests:
          - LayoutLabel_Construction_StoresAllFields

      - id: Rendering-Model-LayoutTree-Badge
        title: >-
          A badge node shall carry its centre, size, shape, and an optional label.
        justification: |
          Badges are small notation icons; carrying shape and size lets a renderer draw the correct
          icon at the correct scale beside its optional label.
        tests:
          - LayoutBadge_Construction_StoresAllFields

      - id: Rendering-Model-LayoutTree-Band
        title: >-
          A band node shall carry its bounds, orientation, an optional label, and nested child
          nodes.
        justification: |
          Swim-lane bands group elements; carrying orientation and children lets a renderer draw the
          lane and its contents in the correct axis.
        tests:
          - LayoutBand_Construction_StoresAllFields

      - id: Rendering-Model-LayoutTree-Lifeline
        title: >-
          A lifeline node shall carry its centre, its top and bottom extent, its header label, and
          its header dimensions.
        justification: |
          Sequence-diagram lifelines are a header box over a vertical stem; carrying both the extent
          and the header size lets a renderer draw the header and dashed stem consistently.
        tests:
          - LayoutLifeline_Construction_StoresAllFields

      - id: Rendering-Model-LayoutTree-Activation
        title: >-
          An activation node shall carry its centre and its top and bottom extent.
        justification: |
          An activation bar marks when a lifeline is active; carrying its centre and extent lets a
          renderer draw the narrow bar over the lifeline stem.
        tests:
          - LayoutActivation_Construction_StoresAllFields

      - id: Rendering-Model-LayoutTree-Grid
        title: >-
          A grid node shall carry its position and its ordered rows, each row flagged as header or
          body and each cell carrying its size, text, alignment, and column span.
        justification: |
          Tabular notation (for example requirement tables) needs per-row header styling and
          per-cell spans so a renderer can draw the table faithfully.
        tests:
          - LayoutGrid_Construction_StoresAllFields

  - title: Options Unit Requirements
    requirements:
      - id: Rendering-Model-Options-Default
        title: >-
          Reading a property that has not been set on a holder shall return that property's declared
          default value.
        justification: |
          Declared defaults let algorithms and renderers read any option unconditionally, without
          each caller having to pre-populate every option first.
        tests:
          - Get_UnsetProperty_ReturnsDefault

      - id: Rendering-Model-Options-StoreAndRetrieve
        title: >-
          A value written for a property shall be returned by a subsequent read of that same
          property.
        justification: |
          Storing and retrieving option values is the core of the configuration system: callers set
          the options they care about and algorithms read them back reliably.
        tests:
          - Get_AfterSet_ReturnsStoredValue

      - id: Rendering-Model-Options-Contains
        title: >-
          A property holder shall report whether a given property has been explicitly set.
        justification: |
          Distinguishing an explicitly-set value from a default lets an algorithm honor an override
          only when a caller actually supplied one.
        tests:
          - Contains_ReflectsExplicitSet

      - id: Rendering-Model-Options-TryGet
        title: >-
          An attempt to read an unset property shall report that no value was set and shall yield the
          declared default.
        justification: |
          A combined test-and-read operation lets a caller branch on whether an override exists while
          still receiving a usable default in a single call.
        tests:
          - TryGet_UnsetProperty_ReturnsFalseAndDefault

  - title: Layout Graph Unit Requirements
    requirements:
      - id: Rendering-Model-LayoutGraph-AddNode
        title: >-
          Adding a node to the input graph shall append a node carrying the requested identity and
          size and shall return that node.
        justification: |
          Returning the created node lets callers configure it further (label, per-element options)
          immediately, while appending preserves the caller's insertion order for deterministic
          layout.
        tests:
          - AddNode_AppendsNodeAndReturnsIt

      - id: Rendering-Model-LayoutGraph-AddEdge
        title: >-
          Adding an edge to the input graph shall append a directed edge referencing the supplied
          source and target nodes and shall return that edge.
        justification: |
          Edges must reference their endpoint nodes so a layout algorithm can route connections;
          returning the edge lets callers set its style and label.
        tests:
          - AddEdge_AppendsEdgeWithEndpoints

      - id: Rendering-Model-LayoutGraph-PerElementProperties
        title: >-
          A graph node shall carry per-element property overrides that are readable through the
          property-holder contract.
        justification: |
          Per-element overrides let a caller tune the layout of an individual node without affecting
          the rest of the graph, supporting the open configuration model.
        tests:
          - Node_CarriesPerElementProperties

      - id: Rendering-Model-LayoutGraph-ContainerNodes
        title: >-
          A graph node shall be able to contain a nested child subgraph of nodes and edges, and shall
          report whether it currently acts as such a container.
        justification: |
          A hierarchical input model lets a caller describe compound elements — a package holding its
          members, a block holding its parts — as a node that in turn contains its own graph, so a
          layout engine can place nested content recursively. Reporting container status lets
          consumers distinguish a container from a leaf and skip empty containers.
        tests:
          - LayoutGraphNode_Children_ContainerNode_HoldsChildNodesAndEdges
          - LayoutGraphNode_HasChildren_LeafNode_ReturnsFalse

      - id: Rendering-Model-LayoutGraph-ScopedIdentifiers
        title: >-
          Node and edge identifiers shall be unique within each container scope and may be reused
          across different scopes.
        justification: |
          Scoping identifiers to a container lets each nested subgraph be described independently
          without a caller having to invent globally-unique names, while still guaranteeing that a
          layout engine can address every element unambiguously within its own scope.
        tests:
          - LayoutGraph_AddNode_ChildScope_AllowsIdReuseAcrossScopes
          - LayoutGraph_AddNode_ChildScope_DuplicateId_ThrowsArgumentException

      - id: Rendering-Model-LayoutGraph-CrossContainerEdge
        title: >-
          An edge held in a container shall be able to reference nodes that reside in different
          descendant containers, so that connections spanning container boundaries are expressible.
        justification: |
          Real diagrams connect elements that live in different groups; allowing an edge in an ancestor
          container to reference descendant endpoints lets a caller express those cross-boundary
          connections without a distinct edge type, so a layout engine can route them at the lowest
          common ancestor.
        tests:
          - LayoutGraphEdge_CrossContainer_ReferencingDescendant_ConstructibleAtRoot
