---
# System-Level Platform Requirements
#
# These requirements specify the platforms and frameworks the rendering library must support.
# Test links use a source-filter prefix (e.g. "windows@", "net8.0@") to restrict which test results
# count as evidence, so a platform requirement is only satisfied by a run on that platform or runtime.
#
# Each platform requirement is traced to representative tests spanning the three managed layers of the
# stack - the model (property system), the layout engine (layered placement and routing), and a
# renderer (SVG document emission) - so a passing run on a given matrix cell demonstrates that the
# library builds and executes end to end on that platform/runtime, not merely that a single type loads.

sections:
  - title: Platform Support
    requirements:
      - id: Rendering-Platform-Windows
        title: The rendering library shall build and run on Windows platforms.
        justification: |
          DEMA Consulting libraries must support Windows as a major development platform.
        tests:
          - "windows@Get_AfterSet_ReturnsStoredValue"
          - "windows@Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges"
          - "windows@SvgRenderer_Render_SingleBox_ProducesSvgDocument"

      - id: Rendering-Platform-Linux
        title: The rendering library shall build and run on Linux platforms.
        justification: |
          DEMA Consulting libraries must support Linux for CI/CD and containerized environments.
        tests:
          - "ubuntu@Get_AfterSet_ReturnsStoredValue"
          - "ubuntu@Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges"
          - "ubuntu@SvgRenderer_Render_SingleBox_ProducesSvgDocument"

      - id: Rendering-Platform-MacOS
        title: The rendering library shall build and run on macOS platforms.
        justification: |
          DEMA Consulting libraries must support macOS for developers using Apple platforms.
        tests:
          - "macos@Get_AfterSet_ReturnsStoredValue"
          - "macos@Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges"
          - "macos@SvgRenderer_Render_SingleBox_ProducesSvgDocument"

      - id: Rendering-Platform-Net8
        title: The rendering library shall support the .NET 8 runtime.
        justification: |
          .NET 8 is an LTS release providing long-term stability for enterprise users.
        tests:
          - "net8.0@Get_AfterSet_ReturnsStoredValue"
          - "net8.0@Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges"
          - "net8.0@SvgRenderer_Render_SingleBox_ProducesSvgDocument"

      - id: Rendering-Platform-Net9
        title: The rendering library shall support the .NET 9 runtime.
        justification: |
          .NET 9 support enables users to leverage the latest .NET features.
        tests:
          - "net9.0@Get_AfterSet_ReturnsStoredValue"
          - "net9.0@Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges"
          - "net9.0@SvgRenderer_Render_SingleBox_ProducesSvgDocument"

      - id: Rendering-Platform-Net10
        title: The rendering library shall support the .NET 10 runtime.
        justification: |
          .NET 10 support ensures the library remains compatible with the latest .NET ecosystem.
        tests:
          - "net10.0@Get_AfterSet_ReturnsStoredValue"
          - "net10.0@Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges"
          - "net10.0@SvgRenderer_Render_SingleBox_ProducesSvgDocument"
