---
# DemaConsulting.Rendering.Abstractions - Notation Metrics Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the notation-metrics unit: NotationMetrics and MarkerVertex shared notation geometry.
# - These unit requirements decompose the Rendering-Abstractions-SharedGeometry system requirement declared in
#   rendering-abstractions.yaml.

sections:
  - title: Notation Metrics Requirements
    requirements:
      - id: Rendering-Abstractions-NotationMetrics-TriangleDimensions
        title: >-
          The notation metrics shall define the triangular end-marker geometry with the canonical
          marker dimensions.
        justification: |
          The open chevron, hollow triangle, and filled arrow all share one triangle geometry;
          defining it once ensures every renderer draws these markers identically.
        tests:
          - TriangleFamily_HasCanonicalValues
          - TriangleVertices_ReproduceSvgBoxPoints

      - id: Rendering-Abstractions-NotationMetrics-TriangleApexOvershoot
        title: >-
          The notation metrics shall define a triangular end-marker apex vertex that overshoots
          the line endpoint.
        justification: |
          The apex must extend past the line endpoint so the drawn stroke does not leave a visible
          gap under the marker; defining the overshoot once keeps every renderer's markers aligned.
        tests:
          - TriangleVertices_Apex_OvershootsEndpoint

      - id: Rendering-Abstractions-NotationMetrics-DiamondDimensions
        title: >-
          The notation metrics shall define the diamond end-marker geometry with the canonical
          dimensions.
        justification: |
          The hollow and filled diamonds share one geometry; defining it once keeps the two
          renderers' diamonds identical.
        tests:
          - Diamond_HasCanonicalValues
          - DiamondVertices_ReproduceSvgBoxPoints

      - id: Rendering-Abstractions-NotationMetrics-DiamondFarPointOnEndpoint
        title: >-
          The notation metrics shall define a diamond end-marker far vertex that lands on the
          line endpoint.
        justification: |
          The far point must sit exactly on the endpoint so the diamond anchors precisely on the
          line; defining this once keeps every renderer's diamonds correctly anchored.
        tests:
          - DiamondVertices_FarPoint_LandsOnEndpoint

      - id: Rendering-Abstractions-NotationMetrics-CircleBarGeometry
        title: >-
          The notation metrics shall define the canonical circle and bar end-marker geometry.
        justification: |
          Circle and bar markers complete the end-decoration set; defining their canonical
          dimensions once keeps them consistent across renderers.
        tests:
          - CircleAndBar_HaveCanonicalValues

      - id: Rendering-Abstractions-NotationMetrics-Crossbar
        title: >-
          The notation metrics shall position the redefinition crossbar at the documented fraction of
          the end-marker length.
        justification: |
          The crossbar variant marks redefinition; deriving its position from a single fraction keeps
          it aligned with the triangle it crosses in every renderer.
        tests:
          - Crossbar_IsDerivedFraction

      - id: Rendering-Abstractions-NotationMetrics-AlongLineLength
        title: >-
          The notation metrics shall report the along-line length consumed by each end-marker style.
        justification: |
          Layout strategies reserve a clean straight approach and renderers clamp the final corner
          radius using this length, so both must read it from one place to stay in agreement.
        tests:
          - AlongLineLength_MatchesMarkerBox

      - id: Rendering-Abstractions-NotationMetrics-PortSquare
        title: >-
          The notation metrics shall define the port-square decoration proportion used to draw
          box decorations.
        justification: |
          This intrinsic, theme-independent proportion describes SysML port notation; defining it
          once ensures the SVG and PNG renderers draw the same shape at the same size.
        tests:
          - Port_SizeIsTwiceHalfSize

      - id: Rendering-Abstractions-NotationMetrics-FolderTab
        title: >-
          The notation metrics shall define the folder-tab decoration proportion used to draw
          box decorations.
        justification: |
          This intrinsic, theme-independent proportion describes SysML folder-tab notation; defining
          it once ensures the SVG and PNG renderers draw the same shape at the same size.
        tests:
          - FolderTab_HasDocumentedConstants

      - id: Rendering-Abstractions-NotationMetrics-NoteFold
        title: >-
          The notation metrics shall define the note-fold decoration proportion used to draw box
          decorations.
        justification: |
          This intrinsic, theme-independent proportion describes SysML note-fold notation; defining
          it once ensures the SVG and PNG renderers draw the same shape at the same size.
        tests:
          - NoteFold_HasDocumentedConstants

      - id: Rendering-Abstractions-NotationMetrics-RoundedRectCorner
        title: >-
          The notation metrics shall define the rounded-rectangle corner proportion used to draw
          box decorations.
        justification: |
          This intrinsic, theme-independent proportion describes SysML rounded-rectangle notation;
          defining it once ensures the SVG and PNG renderers draw the same shape at the same size.
        tests:
          - RoundedRectRadius_IsThemeRadiusTimesFactor

      - id: Rendering-Abstractions-NotationMetrics-RejectNullTheme
        title: >-
          NotationMetrics.RoundedRectRadius shall reject a null theme argument with an argument-null
          error.
        justification: |
          RoundedRectRadius derives its result from the theme's corner radius; failing fast on a null
          theme prevents a downstream null-reference failure and surfaces the caller's error at the
          public boundary, matching the convention used by the other geometry-helper classes.
        tests:
          - RoundedRectRadius_NullTheme_ThrowsArgumentNullException

      - id: Rendering-Abstractions-NotationMetrics-Badge
        title: >-
          The notation metrics shall define the badge decoration proportions used to draw box
          decorations.
        justification: |
          These intrinsic, theme-independent proportions describe SysML badge notation; defining
          them once ensures the SVG and PNG renderers draw the same shapes at the same sizes.
        tests:
          - BadgeFractions_HaveDocumentedValues

      - id: Rendering-Abstractions-NotationMetrics-LabelBackground
        title: >-
          The notation metrics shall define the label-background proportion used to draw box
          decorations.
        justification: |
          This intrinsic, theme-independent proportion describes the SysML label-background
          notation; defining it once ensures the SVG and PNG renderers draw the same shape at the
          same size.
        tests:
          - LabelBackground_ExtentMatchesInset
