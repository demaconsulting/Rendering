---
# DemaConsulting.Rendering (Model) Requirements
#
# PURPOSE:
# - Define the requirements for the DemaConsulting.Rendering system: the SysML-agnostic
#   rendering model that provides the placed layout-tree intermediate representation, the
#   open (ELK-inspired) property-based option system, and the unplaced input layout graph.
# - The first section holds system-level requirements. Each system requirement decomposes
#   downward (children) into the unit requirements that provide the detailed behavior.
# - The remaining sections hold the unit requirements for the three units of this system:
#   layout-tree (the IR records), options (the property system), and layout-graph (the input model).
#
# SCOPE EXCLUSIONS:
# - The following public members are optional presentation or diagnostic metadata carried through
#   unchanged by the model. They carry no algorithmic behavior of their own, and the rendered
#   behavior they influence is specified and verified in the
#   renderer systems (DemaConsulting.Rendering.Svg / DemaConsulting.Rendering.Skia), not in the
#   model. They are therefore intentionally excluded from the Rendering-Model requirement set and
#   are not given individual functional requirements:
#     - LayoutBox.Keyword          - optional SysML keyword text drawn above the box label
#     - LayoutTree.Warnings        - non-fatal layout-quality diagnostics (advisory only)
#     - LayoutGraphNode.Label      - optional input-node display text
#     - LayoutGraphEdge.Label      - optional input-edge midpoint display text
#     - LayoutGraphEdge.TargetEnd  - optional input-edge end-marker style hint
#     - LayoutGraphEdge.LineStyle  - optional input-edge stroke-style hint

sections:
  - title: Rendering Model Requirements
    requirements:
      - id: Rendering-Model-LayoutTree
        title: >-
          The rendering model shall provide a placed layout-tree representation that carries every
          diagram element type with absolute coordinates ready for a renderer to draw.
        justification: |
          Separating a placed, renderer-agnostic intermediate representation from the layout
          algorithms and the renderers lets a single layout be drawn to any output format (SVG,
          PNG) without re-computing geometry, and lets new element types be added additively.
        children:
          - Rendering-Model-LayoutTree-Canvas
          - Rendering-Model-LayoutTree-AbsoluteCoordinates
          - Rendering-Model-LayoutTree-Box
          - Rendering-Model-LayoutTree-DepthNotColor
          - Rendering-Model-LayoutTree-Port
          - Rendering-Model-LayoutTree-Line
          - Rendering-Model-LayoutTree-Label
          - Rendering-Model-LayoutTree-Badge
          - Rendering-Model-LayoutTree-Band
          - Rendering-Model-LayoutTree-Lifeline
          - Rendering-Model-LayoutTree-Activation
          - Rendering-Model-LayoutTree-Grid
          - Rendering-Model-LayoutTree-Geometry
        tests:
          - LayoutTree_Construction_StoresWidthHeightNodes
          - LayoutBox_Construction_StoresAllFields

      - id: Rendering-Model-Configuration
        title: >-
          The rendering model shall provide an open, strongly-typed configuration system that
          carries options at graph, element, and standalone scope without changing any contract.
        justification: |
          An ELK-inspired open property system lets configuration coverage grow purely additively:
          new options are introduced by declaring new keys, so the layout and rendering contracts
          never change signature and unknown options are carried harmlessly.
        children:
          - Rendering-Model-Options-Default
          - Rendering-Model-Options-StoreAndRetrieve
          - Rendering-Model-Options-Contains
          - Rendering-Model-Options-TryGet
        tests:
          - Get_UnsetProperty_ReturnsDefault
          - Get_AfterSet_ReturnsStoredValue

      - id: Rendering-Model-InputGraph
        title: >-
          The rendering model shall provide an unplaced input-graph representation of sized nodes
          and directed edges that a layout algorithm consumes to produce a placed layout tree.
        justification: |
          A distinct input model lets callers describe what is to be laid out (boxes and their
          connections) independently of how any algorithm places them, and lets configuration be
          attached to the whole graph or to individual elements.
        children:
          - Rendering-Model-LayoutGraph-AddNode
          - Rendering-Model-LayoutGraph-AddEdge
          - Rendering-Model-LayoutGraph-PerElementProperties
          - Rendering-Model-LayoutGraph-ContainerNodes
          - Rendering-Model-LayoutGraph-ScopedIdentifiers
          - Rendering-Model-LayoutGraph-CrossContainerEdge
        tests:
          - AddNode_AppendsNodeAndReturnsIt
          - AddEdge_AppendsEdgeWithEndpoints
