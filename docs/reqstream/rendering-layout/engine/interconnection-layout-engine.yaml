---
# DemaConsulting.Rendering.Layout - InterconnectionLayoutEngine Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the interconnection-layout-engine unit.
# - This file is part of the split Rendering.Layout requirements set.

sections:
  - title: InterconnectionLayoutEngine Requirements
    requirements:
      - id: Rendering-Layout-InterconnectionEngine-Layering
        title: >-
          InterconnectionLayoutEngine shall assign layer indices using longest-path layering so that
          every connected pair of nodes occupies different layers.
        justification: |
          Longest-path layering guarantees no same-layer connections, eliminating the connector
          clipping that occurred with the earlier breadth-first approach.
        tests:
          - Place_LinearChain_MonotonicLayerAssignment
          - Place_WorkstationTopology_CorrectLayersAndNoOverlap

      - id: Rendering-Layout-InterconnectionEngine-NonOverlapping
        title: >-
          InterconnectionLayoutEngine shall produce node rectangles that do not overlap.
        justification: |
          Overlapping boxes prevent readable diagrams; the layered column structure and per-column
          vertical stacking guarantee non-overlap by construction.
        tests:
          - Place_WorkstationTopology_CorrectLayersAndNoOverlap

      - id: Rendering-Layout-InterconnectionEngine-DummyNodes
        title: >-
          InterconnectionLayoutEngine shall insert dummy nodes for long edges (span greater than
          one) and exclude them from the returned rectangles so the rect count equals the input node
          count.
        justification: |
          Dummy nodes force routing through the correct inter-layer corridors, preventing connector
          lines from clipping intermediate boxes. They must not appear as layout boxes in the output.
        tests:
          - Place_LongEdge_RectCountEqualsInputNodeCount
          - Place_LongEdge_RoutesViaDummyNodesWithinBounds

      - id: Rendering-Layout-InterconnectionEngine-Waypoints-AcyclicMapping
        title: >-
          InterconnectionLayoutEngine shall return one waypoint list per acyclic edge after
          self-loop removal, duplicate-pair de-duplication, and back-edge reversal, with the
          waypoint list index-aligned to the reported acyclic edge set.
        justification: |
          Pre-computed waypoints allow the public algorithm and the interconnection view to emit
          connector lines without additional routing logic. The layered-layout pipeline requires an
          acyclic graph to assign layers, so cycle-breaking necessarily runs before routing; the
          waypoint contract reflects this and lets a consumer recover each retained edge's route.
        tests:
          - Place_CyclicGraph_ReversesBackEdgeAndProducesWaypoint

      - id: Rendering-Layout-InterconnectionEngine-Waypoints-StraightSpanOne
        title: >-
          InterconnectionLayoutEngine shall route a span-one edge as a straight two-waypoint path.
        justification: |
          A direct connection between adjacent layers does not require dummy nodes or bend points, so
          the routed path should remain a straight source-port to target-port segment.
        tests:
          - Place_SingleEdge_ProducesStraightTwoWaypointPath

      - id: Rendering-Layout-InterconnectionEngine-Waypoints-LongEdgeRouting
        title: >-
          InterconnectionLayoutEngine shall route a long edge via dummy nodes within the layout
          bounds.
        justification: |
          Routing long edges through intermediate dummy nodes keeps connectors in the correct
          inter-layer corridors and prevents them from clipping intervening boxes.
        tests:
          - Place_LongEdge_RoutesViaDummyNodesWithinBounds

      - id: Rendering-Layout-InterconnectionEngine-Direction-RequestedFlow
        title: >-
          InterconnectionLayoutEngine shall place nodes along the requested flow direction.
        justification: |
          Directed views request a specific reading order, so the engine must orient the node stack
          to match the selected layout direction.
        tests:
          - Place_DownDirection_TransposesTotalsRelativeToRight

      - id: Rendering-Layout-InterconnectionEngine-Direction-TransposedTotals
        title: >-
          InterconnectionLayoutEngine shall transpose the reported total dimensions for top-to-bottom
          and bottom-to-top flow directions.
        justification: |
          Consumers need total dimensions that match the rendered screen-space orientation when the
          layered layout is rotated away from the default rightward flow.
        tests:
          - Place_DownDirection_TransposesTotalsRelativeToRight

      - id: Rendering-Layout-InterconnectionEngine-Direction-DefaultsToRight
        title: >-
          InterconnectionLayoutEngine shall default to the left-to-right flow when no direction is
          requested.
        justification: |
          Preserving the established rightward default keeps existing callers behavior-preserving when
          they omit the optional direction argument.
        tests:
          - Place_DefaultDirection_MatchesRightFlow

      - id: Rendering-Layout-InterconnectionEngine-Deterministic
        title: >-
          Given identical input, InterconnectionLayoutEngine shall produce identical geometry and
          waypoints on every invocation.
        justification: |
          Reproducible layout is required so regenerating a view from unchanged input does not shift
          boxes or change connector routes.
        tests:
          - Place_RepeatedInvocation_ProducesIdenticalGeometry
