---
# DemaConsulting.Rendering.Layout - Layered Pipeline Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the layered-pipeline unit.
# - This file is part of the split Rendering.Layout requirements set.

sections:
  - title: Layered Pipeline Requirements
    requirements:
      - id: Rendering-Layout-LayeredPipeline-StagedPipeline
        title: >-
          The layered pipeline shall compute a layout by running an ordered sequence of composable
          stages, each implementing a common stage interface, over a single shared graph state.
        justification: |
          Expressing the algorithm as ordered, independently testable stages lets the pipeline be
          extended, reordered, and verified one stage at a time instead of as one monolithic method.
        tests:
          - LayeredLayoutPipeline_RunDefaultStages_ChainGraph_PopulatesWaypointsWithoutThrowing
          - Pipeline_MatchesLegacyOracle_OnRandomGraphs

      - id: Rendering-Layout-LayeredPipeline-BehaviorPreserving
        title: >-
          The layered pipeline shall produce the same rectangles, totals, layer assignments, and
          connector waypoints as the legacy monolithic interconnection engine for every input.
        justification: |
          The pipeline was extracted from the monolithic engine as a behavior-preserving refactor;
          identical geometry is required so existing views render unchanged.
        tests:
          - Pipeline_MatchesLegacyOracle_OnRandomGraphs
          - Pipeline_MatchesLegacyOracle_OnEmptyGraph
          - Pipeline_MatchesLegacyOracle_OnDroneLikeGraph
          - Pipeline_MatchesLegacyOracle_OnWorkstationLikeGraph
          - Pipeline_MatchesLegacyOracle_OnNamedTopologies

      - id: Rendering-Layout-LayeredPipeline-FlatHierarchyOnly
        title: >-
          The layered pipeline shall assemble the flat (single-graph) stage sequence by default, and
          shall additionally assemble a runnable recursive-hierarchy stage sequence, via
          AddRecursiveStages, when recursive hierarchy handling is requested, rather than rejecting it
          with an error.
        justification: |
          Flat handling reproduces the current behavior exactly. Recursive handling — formerly a
          fail-fast NotSupportedException placeholder — now assembles a genuinely runnable combined-pass
          pipeline that the hierarchical algorithm drives in production (through RunRecursive) to lay
          out a boundary-port container and its nested descendants together, so the pipeline no longer
          needs to reject the recursive mode.
        tests:
          - LayeredLayoutPipeline_RunDefaultStages_ChainGraph_PopulatesWaypointsWithoutThrowing
          - LayeredLayoutPipeline_Build_RecursiveHierarchy_ProducesRunnablePipeline

      - id: Rendering-Layout-LayeredPipeline-RecursiveCombinedPass
        title: >-
          The recursive-hierarchy stage sequence, assembled by AddRecursiveStages and run through
          RunRecursive, shall lay out a boundary-port container and all of its nested descendants in one
          combined pass — assigning layers and minimizing crossings recursively across every level,
          seeding one crossing dummy per boundary face, and tagging each boundary-port crossing on its
          augmented node — so the hierarchical algorithm can drive it in production to place and route
          boundary-port hierarchies.
        justification: |
          Boundary-port hierarchies are laid out by running the recursive stage sequence over the
          assembled merge region rather than by reconciling separately-placed scopes. Recursive layer
          assignment and crossing minimization coordinate the ordering of the container faces that share
          a boundary port, the merge-region graph assembler seeds one crossing dummy per boundary face
          and flattens every interior node into its level, and the long-edge splitter carries each
          crossing tag through untouched so a crossing dummy stays a tagged terminal hop. This combined
          pass — not a post-hoc endpoint reconciliation — is the production path the hierarchical
          algorithm uses whenever a scope contains at least one boundary port.
        tests:
          - CrossingMinimizer_MinimizeCrossingsRecursive_TwoLevelHierarchy_ChildOrderPropagatesToParent
          - CrossingMinimizer_InteriorNodeReordering_OrdinaryNodeParticipatesInRealCrossingMinimization
          - MergeRegionGraphAssembler_Assemble_SingleLevelBoundaryPort_ProducesOneChildLevel
          - MergeRegionGraphAssembler_Assemble_ThreeLevelChain_RecursesToDepthThree
          - MergeRegionGraphAssembler_Assemble_NonBoundaryInteriorNode_IncludedInFullFlattening
          - LongEdgeSplitter_Apply_CrossingTaggedNode_PreservesTagAndIsNotSplit

      - id: Rendering-Layout-LayeredPipeline-HierarchyCrossingDescriptor
        title: >-
          An augmented node shall be able to carry an optional hierarchy-crossing descriptor
          identifying the container face a boundary-port crossing occupies, defaulting to none so a
          node with no crossing is constructed byte-identically to before the descriptor existed.
        justification: |
          Ordering several boundary-port crossings that share one container face requires a per-node
          record of which face each crossing occupies. Making the descriptor optional and defaulting
          it to none keeps every existing flat-graph augmented node — and therefore the flat fast
          path — byte-identical.
        tests:
          - LayeredLayoutPipeline_Build_RecursiveHierarchy_ProducesRunnablePipeline

      - id: Rendering-Layout-LayeredPipeline-BoundaryPortDetection
        title: >-
          The boundary-port merge-region builder shall structurally detect a container's boundary
          ports — a port referenced by an edge inside that container's own child scope — across the
          whole hierarchy, transitively and to unbounded depth, and shall not misclassify a
          same-scope port or a leaf-node port as a boundary port.
        justification: |
          A boundary (delegation) port is recognized purely structurally: the inward delegation edge
          referencing the port from within the container's children is the signal. Detecting this
          across every level (via a recursive collect) makes boundary-port support general and
          depth-unbounded, while excluding same-scope and leaf ports keeps flat and ordinary
          port-edge graphs on their unchanged code path.
        tests:
          - Collect_NoPorts_ReturnsEmpty
          - Collect_SameScopePort_NotDetectedAsBoundary
          - Collect_DelegationPort_DetectedWithExternalAndInternalEdges
          - Collect_TwoIndependentPorts_DetectsBoth
          - CollectRecursive_ThreeLevelChain_ReportsEveryLevel
          - Collect_PortOnLeafNode_NotDetected

      - id: Rendering-Layout-LayeredPipeline-BoundaryPortResolution
        title: >-
          The merge-region decomposer shall project the recursive combined-pass placement back into
          per-scope geometry, resolving each detected boundary port to one shared anchor on its
          container's face — the face given by BoundaryPortResolver.FaceForDirection — and taking every
          converging edge's waypoints from the orthogonal corridor router so no endpoint is joined to
          the anchor by a hand-built diagonal.
        justification: |
          Rather than reconciling endpoints the per-scope leaf pass already placed, the decomposer reads
          the combined pass's routed polylines directly: the external approach concatenates the approach
          and container-link polylines, and the internal delegation prepends the shared anchor to the
          delegation polyline with at most one orthogonal corner. Keying the shared anchor on the
          boundary port's reference identity collapses the external and internal faces of one port onto
          a single physical point, and FaceForDirection gives the anchor its container face for each of
          the four flow directions. Routing every converging edge through the real router keeps the
          fan-in, fan-out, and multi-level-chain approaches axis-aligned.
        tests:
          - FaceForDirection_Right_ReturnsLeftFace
          - FaceForDirection_Left_ReturnsRightFace
          - FaceForDirection_Down_ReturnsTopFace
          - FaceForDirection_Up_ReturnsBottomFace
          - MergeRegionDecomposer_FanIn_EveryConvergingEdge_IsStrictlyOrthogonalWithNoDirectDiagonal
          - MergeRegionDecomposer_FanOut_EveryDelegatedEdge_IsStrictlyOrthogonalWithNoDirectDiagonal
          - MergeRegionDecomposer_InternalFanOut_DelegationEdges_TakeMinimalBendPathWithNoReversal
          - OrthogonalRouter_Apply_MirrorSymmetricConvergingEdges_ProduceIdenticalFirstBendOffsets
          - OrthogonalRouter_Apply_MirrorSymmetricDivergingEdges_ProduceIdenticalFirstBendOffsets

      - id: Rendering-Layout-LayeredPipeline-Directions
        title: >-
          The layered pipeline shall support laying out graphs in the right, down, left, and up flow
          directions, mapping the abstract left-to-right computation onto screen coordinates for the
          requested direction via the axis-transform stage.
        justification: |
          The stages compute in the left-to-right abstract axes and the axis transform maps the
          result onto the requested direction; directed views rely on the down direction, so all
          four directions must be supported.
        tests:
          - AxisTransform_Apply_RightDirection_LeavesCoordinatesUnchanged
          - AxisTransform_Apply_Right_PlacesTargetEastWithCorrectFaces
          - AxisTransform_Apply_Down_PlacesTargetSouthWithCorrectFaces
          - AxisTransform_Apply_Left_PlacesTargetWestWithCorrectFaces
          - AxisTransform_Apply_Up_PlacesTargetNorthWithCorrectFaces

      - id: Rendering-Layout-LayeredPipeline-OrthogonalConnectors
        title: >-
          The layered pipeline shall emit connector waypoints composed solely of axis-aligned
          segments in every supported flow direction.
        justification: |
          Orthogonal connectors are the diagram convention; after mapping to any of the four screen
          directions, consecutive waypoints must still share an X or a Y coordinate.
        tests:
          - AxisTransform_Apply_Right_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Down_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Left_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Up_ProducesOrthogonalWaypoints

      - id: Rendering-Layout-LayeredPipeline-CycleBreaking
        title: >-
          The cycle-breaking stage shall reverse cycle-causing edges to produce an acyclic edge set
          and shall drop self-loops and duplicate directed edges.
        justification: |
          Longest-path layering requires an acyclic graph; reversing back edges and discarding
          self-loops and duplicates yields the acyclic edge set the later stages assume.
        tests:
          - CycleBreaker_Apply_GraphWithCycle_ProducesAcyclicEdgeSet
          - CycleBreaker_Apply_SelfLoopsAndDuplicates_AreRemoved

      - id: Rendering-Layout-LayeredPipeline-MergeParallelEdges
        title: >-
          The cycle-breaking stage shall honor LayeredGraph.MergeParallelEdges: when true (the
          default), it deduplicates by (source, target) after back-edge reversal exactly as before
          this property existed; when false, it retains every parallel edge instance (self-loops are
          still always dropped) so later stages receive one augmented edge per original edge.
        justification: |
          Parallel-edge preservation must start at cycle-breaking, since it is the first stage that
          discards duplicate node pairs; every later stage (PortDistributor, LongEdgeJoiner,
          LayeredCorridorRouter) already operates per-edge-index and needs no change once
          CycleBreaker stops filtering duplicates out.
        tests:
          - CycleBreaker_Apply_MergeParallelEdgesFalse_RetainsEveryParallelEdgeInstance
          - CycleBreaker_Apply_MergeParallelEdgesDefaultTrue_CollapsesDuplicates

      - id: Rendering-Layout-LayeredPipeline-LayerAssignment
        title: >-
          The layer-assignment stage shall assign each node the longest-path layer index so that
          every edge runs from a strictly lower layer to a strictly higher layer.
        justification: |
          Longest-path layering places every node as far right as its dependencies allow, guaranteeing
          monotonic layer progression and preventing same-layer connections.
        tests:
          - LayerAssigner_Apply_LinearChain_AssignsMonotonicLayers
          - LayerAssigner_Apply_DiamondGraph_AssignsLongestPathLayers

      - id: Rendering-Layout-LayeredPipeline-LongEdgeSplitting
        title: >-
          The long-edge-splitting stage shall insert one dummy node per intermediate layer for each
          edge spanning more than one layer and shall add no dummy node for a span-one edge.
        justification: |
          Dummy nodes reserve inter-layer corridors so long connectors route around, rather than
          through, the boxes of intervening layers.
        tests:
          - LongEdgeSplitter_Apply_SpanOneEdge_AddsNoDummyNodes
          - LongEdgeSplitter_Apply_LongEdge_InsertsDummyNodesPerIntermediateLayer

      - id: Rendering-Layout-LayeredPipeline-CrossingMinimization
        title: >-
          The crossing-minimization stage shall order the augmented nodes within each layer to reduce
          edge crossings while retaining every augmented node in its layer group.
        justification: |
          Fewer edge crossings produce a more readable diagram; the ordering must reduce crossings
          without ever losing a node from its layer.
        tests:
          - CrossingMinimizer_Apply_CrossingProneOrdering_ReducesCrossings
          - CrossingMinimizer_Apply_TwoLayerGraph_GroupsNodesByLayer
          - CrossingMinimizer_Apply_AllAugmentedNodesAppearInGroups

      - id: Rendering-Layout-LayeredPipeline-CoordinateAssignment
        title: >-
          The coordinate-assignment stage shall assign every augmented node absolute coordinates with
          layer columns ordered left to right and forks centered between their targets.
        justification: |
          Brandes-Kopf placement fixes each node's position with layers as ordered columns and
          symmetric structures centered, giving the diagram its balanced final geometry.
        tests:
          - BrandesKopfPlacer_Apply_ChainGraph_AssignsCoordinateArrays
          - BrandesKopfPlacer_Apply_ColumnsAreLeftToRightInLayerOrder
          - BrandesKopfPlacer_Apply_SymmetricFork_CentersSourceBetweenTargets

      - id: Rendering-Layout-LayeredPipeline-IsolatedNodeSpacing
        title: >-
          A genuinely isolated real node (zero incident augmented edges) shall be ordered to one end of
          its layer by the crossing-minimization stage, and shall be spaced no more than NodeSpacing
          from its nearest neighbor in that layer by the coordinate-assignment stage, regardless of
          where an unrelated edge or dummy chain elsewhere in the layer happens to land.
        justification: |
          The crossing-minimization stage's barycenter sort previously fell back to a node's arbitrary
          current index whenever it had no same-layer-adjacent neighbors, letting an isolated node land
          next to an unrelated dummy chain; because Brandes-Kopf's one-directional vertical compaction
          treats whatever is ordered above a node as a hard floor, and a dummy carries zero height, the
          isolated node could inherit a compaction floor meant for an unrelated edge and end up far
          below its true neighbor. Clustering every isolated node to one end of the layer's order, and
          then squeezing the gap ahead of that trailing run down to exactly NodeSpacing, turns scattered
          inflated gaps into ordinary, predictable spacing without touching the position of any
          edge-bearing node (dummy or real).
        tests:
          - CrossingMinimizer_Apply_IsolatedNodeAmongDummyChain_ClustersIsolatedNodesAtLayerEnd
          - BrandesKopfPlacer_Apply_IsolatedNodeAfterPulledDownNeighbor_SqueezesGapToNodeSpacing
          - BrandesKopfPlacer_Apply_AddingIsolatedNode_LeavesEdgeBearingNodesUnchanged
          - Gallery_IsolatedNodeLayerGap_RendersSvg

      - id: Rendering-Layout-LayeredPipeline-PortDistribution
        title: >-
          The port-distribution stage shall assign each sub-edge a source-side and target-side port
          that lies within the corresponding node face.
        justification: |
          Distributing ports along box faces keeps parallel connectors from overlapping and ensures
          every sub-edge leaves and enters within the bounds of its node's face.
        tests:
          - PortDistributor_Apply_SingleEdge_PortsLieWithinNodeFaces
          - PortDistributor_Apply_AssignsPortYForEverySubEdge

      - id: Rendering-Layout-LayeredPipeline-OrthogonalRouting
        title: >-
          The orthogonal-routing stage shall emit axis-aligned bend points per corridor, producing no
          bend points for a straight sub-edge.
        justification: |
          Slot-based orthogonal routing gives every connector its right-angled shape; a sub-edge whose
          endpoints already align needs no bends.
        tests:
          - OrthogonalRouter_Apply_StraightEdge_ProducesNoBendPoints
          - OrthogonalRouter_Apply_EveryBendListIsEmptyOrVerticalSegment

      - id: Rendering-Layout-LayeredPipeline-BackEdgeApproach
        title: >-
          The orthogonal-routing stage shall reserve at least the configured back-edge entry approach
          for a reversed edge's final segment, defaulting to a value that leaves forward geometry
          byte-identical to the legacy engine.
        justification: |
          A decoration-aware caller can lengthen the reversed-edge approach so an end marker clears the
          box, while the default keeps forward and acyclic geometry unchanged.
        tests:
          - OrthogonalRouter_DefaultApproach_IsByteIdenticalToLegacy
          - OrthogonalRouter_CustomApproach_PushesEntryStubOutward
          - OrthogonalRouter_ReversedEdge_DefaultApproachClearsClearance
          - OrthogonalRouter_ForwardEdges_GeometryUnchanged
          - OrthogonalRouter_AcyclicGraph_NoApproachChange
          - OrthogonalRouter_DecorationAwareApproach_ClearsMarkerAlongLength

      - id: Rendering-Layout-LayeredPipeline-LongEdgeJoining
        title: >-
          The long-edge-joining stage shall concatenate the bend points of a split edge's sub-edges
          into one polyline per original edge.
        justification: |
          A long edge split across dummy nodes must be reassembled into a single connector polyline so
          consumers see one route per original edge.
        tests:
          - LongEdgeJoiner_Apply_SingleEdge_ProducesWaypointsPerOriginalEdge
          - LongEdgeJoiner_Apply_LongEdge_ConcatenatesSubEdgeBendPoints

      - id: Rendering-Layout-LayeredPipeline-ComponentPacking
        title: >-
          The component-packing stage shall lay out each connected component independently and pack
          the components without overlap in a deterministic order.
        justification: |
          Disconnected graphs must place each component with its own layered layout and then arrange
          the components compactly and reproducibly so nothing overlaps.
        tests:
          - ComponentPacker_Apply_DisconnectedSingletons_PackSeparately
          - ComponentPacker_Apply_ConnectedCore_StaysOneComponent
          - ComponentPacker_Apply_SingleComponent_EqualsDefaultPipeline
          - ComponentPacker_Apply_ComponentOrder_IsDeterministic
          - ComponentPacker_Apply_Waypoints_TranslatedWithComponent
          - ComponentPacker_Apply_EmptyGraph_IsNoOp
          - ComponentPacker_Apply_SingleComponent_ParallelAndSelfEdges_ProducesAlignedWaypoints
          - ComponentPacker_Apply_MultiComponent_ParallelAndSelfEdges_MergesAlignedWaypoints

      - id: Rendering-Layout-LayeredPipeline-PackedComponentsBackEdgeApproach
        title: >-
          The component-packing stage shall propagate the parent graph's configured back-edge entry
          approach to every packed child component's graph.
        justification: |
          Each packed component is laid out through a freshly constructed child LayeredGraph; without
          copying the parent's BackEdgeEntryApproach, a caller-customized reversed-edge clearance would
          silently revert to the class default for any multi-component (disconnected) graph.
        tests:
          - ComponentPacker_Apply_MultiComponent_PropagatesBackEdgeEntryApproach

      - id: Rendering-Layout-LayeredPipeline-SharedState
        title: >-
          The layered graph shall carry the mutable shared state threaded through every stage and
          shall reject construction with null nodes or null edges.
        justification: |
          A single shared state object replaces the ad-hoc locals of the monolithic engine; rejecting
          null inputs at construction keeps every downstream stage operating on valid state.
        tests:
          - LayeredGraph_Constructor_ValidInput_StoresNodesEdgesDirectionAndCount
          - LayeredGraph_Constructor_NullNodes_ThrowsArgumentNullException
          - LayeredGraph_Constructor_NullEdges_ThrowsArgumentNullException

      - id: Rendering-Layout-LayeredPipeline-InputValidation
        title: >-
          The layered pipeline shall reject a null stage when assembled and a null graph when run,
          throwing an argument-null error in each case.
        justification: |
          Failing fast on null construction and run arguments prevents malformed pipelines from
          silently producing incorrect or partial layouts.
        tests:
          - LayeredLayoutPipeline_AddStage_NullStage_ThrowsArgumentNullException
          - LayeredLayoutPipeline_Run_NullGraph_ThrowsArgumentNullException

      - id: Rendering-Layout-LayeredPipeline-ShapeAwareAnchors
        title: >-
          The port-distribution and long-edge-joining stages shall restrict a shaped node's connector
          ports to its usable connectable face extents and shall project the resulting endpoint inward
          to the shape's real outline, matching ConnectorRouter's shape-geometry rules.
        justification: |
          LayeredLayoutAlgorithm's own routing pipeline previously anchored every connector to the
          plain bounding-box face, ignoring BoxShape.Folder/Note/RoundedRectangle geometry, so a
          same-scope (leaf) edge routed through the layered pipeline looked inconsistent with an
          equivalent cross-container edge routed through ConnectorRouter. Reusing ConnectorRouter's
          already-tested extent-restriction and surface-projection rules gives both routing paths the
          same anchor-projection parity for every BoxShape.
        tests:
          - PortDistributor_Apply_FolderTargetTopFace_Down_PortExcludesTabRegion
          - PortDistributor_Apply_NoteSourceRightFace_Right_PortExcludesFoldRegion
          - PortDistributor_Apply_RectangleNode_MatchesPlainFullSpanFormula
          - LongEdgeJoiner_Apply_FolderTargetTopFace_Down_ProjectsInwardByTabHeight
          - LongEdgeJoiner_Apply_FolderSourceTopFace_Up_ProjectsInwardByTabHeight
          - LongEdgeJoiner_Apply_FolderNode_Right_NonTopFaceUnaffected
          - LongEdgeJoiner_Apply_FolderNode_Left_NonTopFaceUnaffected
          - LongEdgeJoiner_Apply_RectangleNode_MatchesPlainFormula
          - Apply_DownDirection_FolderTarget_ProjectsEndpointToRecessedTop
          - Apply_UpDirection_FolderSource_ProjectsEndpointToRecessedTop
          - Apply_RightDirection_FolderTarget_LeftFaceUnaffectedByTab
          - Apply_LeftDirection_FolderTarget_RightFaceUnaffectedByTab
          - Apply_DownDirection_NoteTarget_ExcludesFoldFromLandingZone
          - Apply_RectangleChain_MatchesPreShapeAwarenessOutput
