---
# DemaConsulting.Rendering.Layout - Layered Pipeline Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the layered-pipeline unit.
# - This file is part of the split Rendering.Layout requirements set.

sections:
  - title: Layered Pipeline Requirements
    requirements:
      - id: Rendering-Layout-LayeredPipeline-StagedPipeline
        title: >-
          The layered pipeline shall compute a layout by running an ordered sequence of composable
          stages, each implementing a common stage interface, over a single shared graph state.
        justification: |
          Expressing the algorithm as ordered, independently testable stages lets the pipeline be
          extended, reordered, and verified one stage at a time instead of as one monolithic method.
        tests:
          - LayeredLayoutPipeline_RunDefaultStages_ChainGraph_PopulatesWaypointsWithoutThrowing
          - Pipeline_MatchesLegacyOracle_OnRandomGraphs

      - id: Rendering-Layout-LayeredPipeline-BehaviorPreserving
        title: >-
          The layered pipeline shall produce the same rectangles, totals, layer assignments, and
          connector waypoints as the legacy monolithic interconnection engine for every input.
        justification: |
          The pipeline was extracted from the monolithic engine as a behavior-preserving refactor;
          identical geometry is required so existing views render unchanged.
        tests:
          - Pipeline_MatchesLegacyOracle_OnRandomGraphs
          - Pipeline_MatchesLegacyOracle_OnEmptyGraph
          - Pipeline_MatchesLegacyOracle_OnDroneLikeGraph
          - Pipeline_MatchesLegacyOracle_OnWorkstationLikeGraph
          - Pipeline_MatchesLegacyOracle_OnNamedTopologies

      - id: Rendering-Layout-LayeredPipeline-FlatHierarchyOnly
        title: >-
          The layered pipeline shall support flat (single-graph) hierarchy handling and shall reject
          recursive hierarchy handling with a clear error until it is implemented.
        justification: |
          Flat handling reproduces the current behavior exactly; failing fast on the unimplemented
          recursive mode prevents silently producing an unsupported layout.
        tests:
          - LayeredLayoutPipeline_Build_RecursiveHierarchy_ThrowsNotSupportedException

      - id: Rendering-Layout-LayeredPipeline-Directions
        title: >-
          The layered pipeline shall support laying out graphs in the right, down, left, and up flow
          directions, mapping the abstract left-to-right computation onto screen coordinates for the
          requested direction via the axis-transform stage.
        justification: |
          The stages compute in the left-to-right abstract axes and the axis transform maps the
          result onto the requested direction; directed views rely on the down direction, so all
          four directions must be supported.
        tests:
          - AxisTransform_Apply_RightDirection_LeavesCoordinatesUnchanged
          - AxisTransform_Apply_Right_PlacesTargetEastWithCorrectFaces
          - AxisTransform_Apply_Down_PlacesTargetSouthWithCorrectFaces
          - AxisTransform_Apply_Left_PlacesTargetWestWithCorrectFaces
          - AxisTransform_Apply_Up_PlacesTargetNorthWithCorrectFaces

      - id: Rendering-Layout-LayeredPipeline-OrthogonalConnectors
        title: >-
          The layered pipeline shall emit connector waypoints composed solely of axis-aligned
          segments in every supported flow direction.
        justification: |
          Orthogonal connectors are the diagram convention; after mapping to any of the four screen
          directions, consecutive waypoints must still share an X or a Y coordinate.
        tests:
          - AxisTransform_Apply_Right_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Down_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Left_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Up_ProducesOrthogonalWaypoints

      - id: Rendering-Layout-LayeredPipeline-CycleBreaking
        title: >-
          The cycle-breaking stage shall reverse cycle-causing edges to produce an acyclic edge set
          and shall drop self-loops and duplicate directed edges.
        justification: |
          Longest-path layering requires an acyclic graph; reversing back edges and discarding
          self-loops and duplicates yields the acyclic edge set the later stages assume.
        tests:
          - CycleBreaker_Apply_GraphWithCycle_ProducesAcyclicEdgeSet
          - CycleBreaker_Apply_SelfLoopsAndDuplicates_AreRemoved

      - id: Rendering-Layout-LayeredPipeline-LayerAssignment
        title: >-
          The layer-assignment stage shall assign each node the longest-path layer index so that
          every edge runs from a strictly lower layer to a strictly higher layer.
        justification: |
          Longest-path layering places every node as far right as its dependencies allow, guaranteeing
          monotonic layer progression and preventing same-layer connections.
        tests:
          - LayerAssigner_Apply_LinearChain_AssignsMonotonicLayers
          - LayerAssigner_Apply_DiamondGraph_AssignsLongestPathLayers

      - id: Rendering-Layout-LayeredPipeline-LongEdgeSplitting
        title: >-
          The long-edge-splitting stage shall insert one dummy node per intermediate layer for each
          edge spanning more than one layer and shall add no dummy node for a span-one edge.
        justification: |
          Dummy nodes reserve inter-layer corridors so long connectors route around, rather than
          through, the boxes of intervening layers.
        tests:
          - LongEdgeSplitter_Apply_SpanOneEdge_AddsNoDummyNodes
          - LongEdgeSplitter_Apply_LongEdge_InsertsDummyNodesPerIntermediateLayer

      - id: Rendering-Layout-LayeredPipeline-CrossingMinimization
        title: >-
          The crossing-minimization stage shall order the augmented nodes within each layer to reduce
          edge crossings while retaining every augmented node in its layer group.
        justification: |
          Fewer edge crossings produce a more readable diagram; the ordering must reduce crossings
          without ever losing a node from its layer.
        tests:
          - CrossingMinimizer_Apply_CrossingProneOrdering_ReducesCrossings
          - CrossingMinimizer_Apply_TwoLayerGraph_GroupsNodesByLayer
          - CrossingMinimizer_Apply_AllAugmentedNodesAppearInGroups

      - id: Rendering-Layout-LayeredPipeline-CoordinateAssignment
        title: >-
          The coordinate-assignment stage shall assign every augmented node absolute coordinates with
          layer columns ordered left to right and forks centered between their targets.
        justification: |
          Brandes-Kopf placement fixes each node's position with layers as ordered columns and
          symmetric structures centered, giving the diagram its balanced final geometry.
        tests:
          - BrandesKopfPlacer_Apply_ChainGraph_AssignsCoordinateArrays
          - BrandesKopfPlacer_Apply_ColumnsAreLeftToRightInLayerOrder
          - BrandesKopfPlacer_Apply_SymmetricFork_CentersSourceBetweenTargets

      - id: Rendering-Layout-LayeredPipeline-PortDistribution
        title: >-
          The port-distribution stage shall assign each sub-edge a source-side and target-side port
          that lies within the corresponding node face.
        justification: |
          Distributing ports along box faces keeps parallel connectors from overlapping and ensures
          every sub-edge leaves and enters within the bounds of its node's face.
        tests:
          - PortDistributor_Apply_SingleEdge_PortsLieWithinNodeFaces
          - PortDistributor_Apply_AssignsPortYForEverySubEdge

      - id: Rendering-Layout-LayeredPipeline-OrthogonalRouting
        title: >-
          The orthogonal-routing stage shall emit axis-aligned bend points per corridor, producing no
          bend points for a straight sub-edge.
        justification: |
          Slot-based orthogonal routing gives every connector its right-angled shape; a sub-edge whose
          endpoints already align needs no bends.
        tests:
          - OrthogonalRouter_Apply_StraightEdge_ProducesNoBendPoints
          - OrthogonalRouter_Apply_EveryBendListIsEmptyOrVerticalSegment

      - id: Rendering-Layout-LayeredPipeline-BackEdgeApproach
        title: >-
          The orthogonal-routing stage shall reserve at least the configured back-edge entry approach
          for a reversed edge's final segment, defaulting to a value that leaves forward geometry
          byte-identical to the legacy engine.
        justification: |
          A decoration-aware caller can lengthen the reversed-edge approach so an end marker clears the
          box, while the default keeps forward and acyclic geometry unchanged.
        tests:
          - OrthogonalRouter_DefaultApproach_IsByteIdenticalToLegacy
          - OrthogonalRouter_CustomApproach_PushesEntryStubOutward
          - OrthogonalRouter_ReversedEdge_DefaultApproachClearsClearance
          - OrthogonalRouter_ForwardEdges_GeometryUnchanged
          - OrthogonalRouter_AcyclicGraph_NoApproachChange
          - OrthogonalRouter_DecorationAwareApproach_ClearsMarkerAlongLength

      - id: Rendering-Layout-LayeredPipeline-LongEdgeJoining
        title: >-
          The long-edge-joining stage shall concatenate the bend points of a split edge's sub-edges
          into one polyline per original edge.
        justification: |
          A long edge split across dummy nodes must be reassembled into a single connector polyline so
          consumers see one route per original edge.
        tests:
          - LongEdgeJoiner_Apply_SingleEdge_ProducesWaypointsPerOriginalEdge
          - LongEdgeJoiner_Apply_LongEdge_ConcatenatesSubEdgeBendPoints

      - id: Rendering-Layout-LayeredPipeline-ComponentPacking
        title: >-
          The component-packing stage shall lay out each connected component independently and pack
          the components without overlap in a deterministic order.
        justification: |
          Disconnected graphs must place each component with its own layered layout and then arrange
          the components compactly and reproducibly so nothing overlaps.
        tests:
          - ComponentPacker_Apply_DisconnectedSingletons_PackSeparately
          - ComponentPacker_Apply_ConnectedCore_StaysOneComponent
          - ComponentPacker_Apply_SingleComponent_EqualsDefaultPipeline
          - ComponentPacker_Apply_ComponentOrder_IsDeterministic
          - ComponentPacker_Apply_Waypoints_TranslatedWithComponent
          - ComponentPacker_Apply_EmptyGraph_IsNoOp
          - ComponentPacker_Apply_SingleComponent_ParallelAndSelfEdges_ProducesAlignedWaypoints
          - ComponentPacker_Apply_MultiComponent_ParallelAndSelfEdges_MergesAlignedWaypoints

      - id: Rendering-Layout-LayeredPipeline-PackedComponentsBackEdgeApproach
        title: >-
          The component-packing stage shall propagate the parent graph's configured back-edge entry
          approach to every packed child component's graph.
        justification: |
          Each packed component is laid out through a freshly constructed child LayeredGraph; without
          copying the parent's BackEdgeEntryApproach, a caller-customized reversed-edge clearance would
          silently revert to the class default for any multi-component (disconnected) graph.
        tests:
          - ComponentPacker_Apply_MultiComponent_PropagatesBackEdgeEntryApproach

      - id: Rendering-Layout-LayeredPipeline-SharedState
        title: >-
          The layered graph shall carry the mutable shared state threaded through every stage and
          shall reject construction with null nodes or null edges.
        justification: |
          A single shared state object replaces the ad-hoc locals of the monolithic engine; rejecting
          null inputs at construction keeps every downstream stage operating on valid state.
        tests:
          - LayeredGraph_Constructor_ValidInput_StoresNodesEdgesDirectionAndCount
          - LayeredGraph_Constructor_NullNodes_ThrowsArgumentNullException
          - LayeredGraph_Constructor_NullEdges_ThrowsArgumentNullException

      - id: Rendering-Layout-LayeredPipeline-InputValidation
        title: >-
          The layered pipeline shall reject a null stage when assembled and a null graph when run,
          throwing an argument-null error in each case.
        justification: |
          Failing fast on null construction and run arguments prevents malformed pipelines from
          silently producing incorrect or partial layouts.
        tests:
          - LayeredLayoutPipeline_AddStage_NullStage_ThrowsArgumentNullException
          - LayeredLayoutPipeline_Run_NullGraph_ThrowsArgumentNullException
