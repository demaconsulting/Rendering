---
# DemaConsulting.Rendering.Layout - ContainmentPacker Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the containment-packer unit.
# - This file is part of the split Rendering.Layout requirements set.

sections:
  - title: ContainmentPacker Requirements
    requirements:
      - id: Rendering-Layout-ContainmentPacker-SingleRow
        title: >-
          ContainmentPacker shall place items that together fit within the maximum content width on
          a single row.
        justification: |
          When the available width can hold all the items, splitting them across rows would waste
          vertical space. Items that fit must share one row, ordered left to right.
        tests:
          - Pack_ItemsFitInRow_ShareSameRow

      - id: Rendering-Layout-ContainmentPacker-Wrapping
        title: >-
          ContainmentPacker shall wrap an item that would exceed the maximum content width onto a
          new row positioned below the current row.
        justification: |
          A row may not grow past the width budget. When the next item would overflow it, the packer
          must start a new row beneath the current one so the content stays within the allotted width.
        tests:
          - Pack_ItemsExceedWidth_WrapToNewRow

      - id: Rendering-Layout-ContainmentPacker-NoOverlap
        title: >-
          ContainmentPacker shall position items so that no two packed rectangles overlap.
        justification: |
          Overlapping items hide one another. Whatever mix of sizes is supplied, every packed
          rectangle must be disjoint from every other.
        tests:
          - Pack_MixedSizes_ProducesNoOverlaps

      - id: Rendering-Layout-ContainmentPacker-WithinBounds
        title: >-
          ContainmentPacker shall place every packed rectangle within the bounds of the region size
          it reports.
        justification: |
          Callers size the container from the reported region width and height. Every packed
          rectangle must lie inside those bounds so that nothing is clipped or drawn outside the
          container.
        tests:
          - Pack_MixedSizes_AllRectsWithinBounds

      - id: Rendering-Layout-ContainmentPacker-OversizedItem
        title: >-
          ContainmentPacker shall place an item wider than the maximum content width alone on its
          own row and shall widen the region to contain it.
        justification: |
          An item that cannot fit the width budget still has to be placed. It must occupy its own
          row, and the reported region must grow so the oversized item remains fully contained.
        tests:
          - Pack_ItemWiderThanContentWidth_PlacedAloneAndRegionWidens

      - id: Rendering-Layout-ContainmentPacker-EmptyInput
        title: >-
          When given no items, ContainmentPacker shall return an empty result whose region consists
          solely of the requested padding.
        justification: |
          An empty input is a valid degenerate case. The packer must return a well-formed, empty
          result sized only by the padding rather than failing.
        tests:
          - Pack_EmptyList_ReturnsPaddingOnlyRegion

      - id: Rendering-Layout-ContainmentPacker-SingleItem
        title: >-
          When given a single item, ContainmentPacker shall place it at the padding origin and size
          the region to that item plus padding.
        justification: |
          A lone item has a predictable home: the padding origin, with the region sized to wrap it
          exactly plus the requested padding on each side.
        tests:
          - Pack_SingleItem_PositionsAtPaddingOrigin
