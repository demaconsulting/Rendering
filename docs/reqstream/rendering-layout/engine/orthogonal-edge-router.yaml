---
# DemaConsulting.Rendering.Layout - OrthogonalEdgeRouter Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the orthogonal-edge-router unit.
# - This file is part of the split Rendering.Layout requirements set.

sections:
  - title: OrthogonalEdgeRouter Requirements
    requirements:
      - id: Rendering-Layout-OrthogonalEdgeRouter-Orthogonal
        title: >-
          OrthogonalEdgeRouter shall produce a path of axis-aligned segments connecting the source anchor
          to the target anchor.
        justification: |
          Orthogonal (axis-aligned) connectors are the convention for the block, state, and activity
          diagrams the library renders. Consecutive waypoints therefore always share an X or a Y
          coordinate.
        tests:
          - Route_NoObstacles_ProducesOrthogonalPath
          - Route_AlignedEndpoints_ProducesStraightLine

      - id: Rendering-Layout-OrthogonalEdgeRouter-AvoidObstacles
        title: >-
          When an obstacle-free path exists, OrthogonalEdgeRouter shall route around obstacle rectangles
          without passing through their interiors.
        justification: |
          Connectors that cut through unrelated boxes are unreadable. The router must steer segments
          around obstacles whenever the geometry allows.
        tests:
          - Route_ObstacleBetween_RoutesAround
          - Route_MultipleObstacles_RemainsValid
          - RouteWithStatus_ObstacleBetween_RoutesAroundWithoutCrossing

      - id: Rendering-Layout-OrthogonalEdgeRouter-Clearance
        title: >-
          When an obstacle-free path is achievable, OrthogonalEdgeRouter shall keep routed segments clear
          of obstacles by the caller-specified clearance distance.
        justification: |
          A connector that grazes the edge of a box reads as touching it. Honoring a clearance keeps
          visible breathing space between connectors and unrelated boxes.
        tests:
          - RouteWithStatus_CleanRoute_KeepsClearanceFromObstacles

      - id: Rendering-Layout-OrthogonalEdgeRouter-PerpendicularEnds
        title: >-
          When an anchor is given with the box side it sits on, OrthogonalEdgeRouter shall leave or enter
          that anchor with a segment perpendicular to the side.
        justification: |
          Connectors that meet a box edge at a right angle read as attached to the box rather than
          sliding along its border, matching diagram notation conventions.
        tests:
          - Route_WithSourceSide_LeavesPerpendicular
          - Route_WithTargetSide_EntersPerpendicular

      - id: Rendering-Layout-OrthogonalEdgeRouter-CrossingStatus
        title: >-
          OrthogonalEdgeRouter shall report whether the produced path could not be routed without crossing
          an obstacle.
        justification: |
          When geometry forces a connector through a box (for example an enclosed target), callers
          need to know so the condition can be surfaced as a layout warning rather than silently
          producing a misleading diagram.
        tests:
          - RouteWithStatus_NoBlockingObstacle_ReportsNotCrossed
          - RouteWithStatus_TargetEnclosedByObstacle_ReportsCrossed

      - id: Rendering-Layout-OrthogonalEdgeRouter-CostBands
        title: >-
          When cost bands are supplied, OrthogonalEdgeRouter shall prefer routing through a cheaper band
          over an equal-length alternative outside it.
        justification: |
          Highway bundling depends on a cost discount so parallel wires share a corridor; the router
          must bias toward discounted bands while keeping null bands neutral.
        tests:
          - RouteWithStatus_HighwayBand_PrefersBandedDetour

      - id: Rendering-Layout-OrthogonalEdgeRouter-NoWaypointRevisit
        title: >-
          OrthogonalEdgeRouter shall not publish a waypoint sequence that visits one point, leaves it,
          and later revisits that exact point before continuing.
        justification: |
          A leave-and-return loop is a visibly redundant detour that adds no routing value and makes a
          connector appear to hesitate or double back. The engine must therefore either avoid or
          defensively remove such revisit loops before returning the route.
        tests:
          - RouteWithStatus_SoftObstacleDetour_DoesNotRevisitWaypoint

      - id: Rendering-Layout-OrthogonalEdgeRouter-AvoidsExtendedSoftOverlap
        title: >-
          When an alternate lane is reachable at bounded extra cost, OrthogonalEdgeRouter shall not
          route a segment along an extended overlap with an existing soft obstacle, and shall not need
          to leave the source/target envelope to find that alternate lane.
        justification: |
          Several parallel connectors that each collapse their long corridor onto the same grid line
          visually merge into one thick trunk for the length of the overlap, which reads as a single
          connector rather than several distinct ones. A short, incidental overlap must remain
          tolerated (steering every trivial touch away would force pointless detours and would
          conflict with the legitimate shared endpoint-adjacent approach corridor), but an overlap
          that extends for a substantial span must be priced high enough that a bounded-cost lane
          change is preferred instead. When many parallel connectors share a narrow inter-box gap,
          each successive connector's own soft-obstacle avoidance must not offset its candidate lane
          further and further outward with no ceiling: left unbounded, that stair-stepping eventually
          lands a lane behind a box already left, producing a route that leaves toward the gap,
          reverses back underneath that box, then recovers — a visibly tangled, self-crossing path.
          Soft-obstacle-derived candidate lines are therefore clamped to the source/target envelope on
          any axis with a meaningful span, and any residual A* move that still lands outside that
          envelope is charged a proportional cost (never a hard block), so sharing a saturated
          narrow-gap lane is preferred over an unrelated "free" detour once every in-gap lane is
          exhausted.
        tests:
          - RouteWithStatus_LongSoftObstacleOverlap_PrefersAlternateLane
          - RouteWithStatus_ShortSoftObstacleOverlap_KeepsStraightRoute
          - RouteWithStatus_SaturatedNarrowGapSoftObstacles_StaysWithinEnvelope

      - id: Rendering-Layout-OrthogonalEdgeRouter-AvoidsConnectorCrossing
        title: >-
          When a bounded-cost, non-crossing alternative exists, OrthogonalEdgeRouter shall not route a
          segment transversally across an already-routed connector's soft-obstacle trunk.
        justification: |
          A soft obstacle's own aspect ratio (a fixed ~2px thin dimension on the perpendicular axis,
          the segment's length on its long axis — see ConnectorRouter.AddLineObstacles) reliably
          classifies its orientation. Before this fix, a candidate move that ran perpendicular to a
          soft obstacle (visibly cutting across another connector's trunk at a right angle, an "X"
          crossing) was priced by the same overlap formula used for a parallel shared-lane overlap;
          that formula's overlap span is bounded by the obstacle's own thin dimension regardless of how
          long or visually significant the crossing move itself is, so a genuine connector-to-connector
          crossing was underpriced at roughly a trivial few-pixel overlap — cheaper than a single turn
          and far cheaper than most alternate-lane detours, so the router had no incentive to avoid it.
          The router now detects this perpendicular relationship separately (requiring the candidate
          move to fully traverse both edges of the obstacle's thin band, not merely graze one edge of
          it, so a legitimate short lane-change move is never mistaken for a crossing) and prices it
          with a dedicated flat cost, so a route with a genuinely bounded-cost non-crossing alternative
          takes it. This is a cost, not a hard block: in a sufficiently saturated narrow-gap scenario
          where no non-crossing alternative is reachable at all (for example when a connector's own
          soft obstacles are only known for already-routed connectors earlier in the same routing
          batch, not later ones), a crossing may still be the only path found — this fix corrects the
          pricing gap for cases where an alternative genuinely exists, and does not change the
          batch-level routing order that determines which connectors are visible to each other as
          obstacles.
        tests:
          - RouteWithStatus_VerticalOrientedSoftObstacleAcrossOneLRoute_PrefersNonCrossingAlternative
          - Route_NineParallelEdgesIntoCompartmentBox_DoNotLoopBehindEitherBox
