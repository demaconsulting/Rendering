---
# Rendering.Layout System Requirements
#
# PURPOSE:
# - Define requirements for the Rendering.Layout software system
#   (package DemaConsulting.Rendering.Layout).
# - The system provides the bundled ELK-style layered layout algorithm plus the
#   reusable geometric engines it is built from.
# - Requirements describe observable geometric behavior, not the algorithms used.
#
# STRUCTURE:
# - The first section holds system-level requirements. Two decompose directly
#   into top-level units (the layered pipeline and the public layered layout
#   algorithm); the third (geometric-engines) decomposes into the Engine
#   subsystem requirements.
# - The Engine subsystem section holds the subsystem-level requirements for the
#   reusable geometric engines, which decompose in turn into the channel-router,
#   containment-packer, and interconnection-layout-engine unit requirements.

sections:
  - title: Rendering.Layout System Requirements
    requirements:
      - id: Rendering-Layout-Algorithm
        title: >-
          The rendering layout system shall provide a named layout algorithm that arranges a layout
          graph into a placed layout tree of layered boxes and orthogonally routed connectors.
        justification: |
          The system's product boundary is the public layout algorithm consumed by renderers. It
          converts a caller's abstract graph into concrete placed geometry so downstream SVG and PNG
          renderers can draw the diagram without any layout knowledge of their own.
        children:
          - Rendering-Layout-LayeredAlgorithm-Identity
          - Rendering-Layout-LayeredAlgorithm-PlacesAndRoutes
          - Rendering-Layout-LayeredAlgorithm-EmptyGraph
          - Rendering-Layout-LayeredAlgorithm-Validation
        tests:
          - Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges
          - Id_IsLayered

      - id: Rendering-Layout-GeometricEngines
        title: >-
          The rendering layout system shall be built from reusable, model-agnostic geometric engines
          that provide orthogonal connector routing, containment row-packing, and layered
          interconnection placement as independently verifiable capabilities.
        justification: |
          Grouping the geometric engines into a single subsystem keeps the layout algorithm free of
          model knowledge and lets each engine be developed, verified, and reused on its own. The
          public algorithm composes these engines to turn an abstract graph into placed geometry.
        children:
          - Rendering-Layout-OrthogonalRouting
          - Rendering-Layout-Containment
          - Rendering-Layout-Interconnection
        tests:
          - Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges

      - id: Rendering-Layout-StagedPipeline
        title: >-
          The rendering layout system shall compute layered placement through a composable, ordered
          sequence of ELK-style stages over a single shared graph state object.
        justification: |
          Expressing the algorithm as ordered, independently testable stages lets the pipeline be
          extended, reordered, and verified one stage at a time instead of as one monolithic method.
        children:
          - Rendering-Layout-LayeredPipeline-StagedPipeline
          - Rendering-Layout-LayeredPipeline-BehaviorPreserving
          - Rendering-Layout-LayeredPipeline-FlatHierarchyOnly
          - Rendering-Layout-LayeredPipeline-Directions
          - Rendering-Layout-LayeredPipeline-OrthogonalConnectors
          - Rendering-Layout-LayeredPipeline-CycleBreaking
          - Rendering-Layout-LayeredPipeline-LayerAssignment
          - Rendering-Layout-LayeredPipeline-LongEdgeSplitting
          - Rendering-Layout-LayeredPipeline-CrossingMinimization
          - Rendering-Layout-LayeredPipeline-CoordinateAssignment
          - Rendering-Layout-LayeredPipeline-PortDistribution
          - Rendering-Layout-LayeredPipeline-OrthogonalRouting
          - Rendering-Layout-LayeredPipeline-BackEdgeApproach
          - Rendering-Layout-LayeredPipeline-LongEdgeJoining
          - Rendering-Layout-LayeredPipeline-ComponentPacking
          - Rendering-Layout-LayeredPipeline-SharedState
          - Rendering-Layout-LayeredPipeline-InputValidation
        tests:
          - LayeredLayoutPipeline_RunDefaultStages_ChainGraph_PopulatesWaypointsWithoutThrowing
          - Pipeline_MatchesLegacyOracle_OnRandomGraphs

      - id: Rendering-Layout-ConnectorRouting
        title: >-
          The rendering layout system shall route connectors among already-placed boxes, choosing a
          routing style per scope and producing one placed connector line per connection.
        justification: |
          Placing boxes is only half of a diagram; the connectors joining them must be routed among
          the placed geometry. Exposing a model-agnostic routing orchestration lets any caller connect
          two boxes without reimplementing anchor selection, obstacle avoidance, and per-connector
          routing, and lets the routing style be selected through the same open property system that
          selects the algorithm.
        children:
          - Rendering-Layout-EdgeRouting-Selection
          - Rendering-Layout-EdgeRouting-Defaults
          - Rendering-Layout-ConnectorRouter-AnchorsFaceEachOther
          - Rendering-Layout-ConnectorRouter-AvoidsObstacles
          - Rendering-Layout-ConnectorRouter-ExcludesEndpoints
          - Rendering-Layout-ConnectorRouter-CarriesStyling
          - Rendering-Layout-ConnectorRouter-BatchOrder
          - Rendering-Layout-ConnectorRouter-Validation
        tests:
          - Route_TargetToTheRight_AnchorsFaceEachOther
          - Route_ObstacleBetweenEndpoints_RoutesAroundInterior

      - id: Rendering-Layout-ContainmentPlacement
        title: >-
          The rendering layout system shall pack a set of already-sized model boxes into a single
          container region, arranging them into rows within a width budget and reporting the enclosing
          region size.
        justification: |
          A container groups peer elements whose reading order, not their connectivity, drives the
          layout. Exposing a model-speaking packing operation lets any caller arrange boxes inside a
          container without reimplementing row packing, and returns both the repositioned boxes and the
          region size a renderer needs to draw the container, keeping container sizing consistent across
          every view that nests elements.
        children:
          - Rendering-Layout-ContainmentLayout-Order
          - Rendering-Layout-ContainmentLayout-NoOverlap
          - Rendering-Layout-ContainmentLayout-WithinRegion
          - Rendering-Layout-ContainmentLayout-Wrapping
          - Rendering-Layout-ContainmentLayout-OversizedChild
          - Rendering-Layout-ContainmentLayout-EmptyInput
          - Rendering-Layout-ContainmentLayout-PreservesFields
          - Rendering-Layout-ContainmentLayout-Defaults
          - Rendering-Layout-ContainmentLayout-Validation
        tests:
          - Pack_ItemsFitInRow_PreservesOrderLeftToRight
          - Pack_MixedSizes_ProducesNoOverlaps

      - id: Rendering-Layout-ContainmentAlgorithm
        title: >-
          The rendering layout system shall provide a named containment layout algorithm that packs a
          layout graph's top-level nodes into rows and routes each edge around the packed boxes.
        justification: |
          Some diagrams group their elements as peers whose reading order, not their connectivity,
          drives placement. Exposing a second bundled algorithm that packs nodes into a balanced block
          and routes the edges around them lets a caller select this arrangement by name, additively,
          without changing the layered algorithm or any existing output.
        children:
          - Rendering-Layout-ContainmentAlgorithm-Identity
          - Rendering-Layout-ContainmentAlgorithm-PacksNodes
          - Rendering-Layout-ContainmentAlgorithm-RoutesEdges
          - Rendering-Layout-ContainmentAlgorithm-RoutesAroundObstacle
          - Rendering-Layout-ContainmentAlgorithm-EmptyGraph
          - Rendering-Layout-ContainmentAlgorithm-SkipsOutOfGraphEdges
          - Rendering-Layout-ContainmentAlgorithm-Validation
        tests:
          - Apply_Graph_PacksNodesNonOverlappingInInputOrderWithinCanvas
          - Id_IsContainment

      - id: Rendering-Layout-HierarchicalLayout
        title: >-
          The rendering layout system shall provide a named hierarchical layout algorithm that lays out
          a compound layout graph by placing each container's children within their own region, sizing
          each container to enclose its children, and routing edges that cross container boundaries.
        justification: |
          Diagrams often nest groups within groups — a package holding its members, a block holding its
          parts. Exposing a recursive engine that composes the bundled leaf algorithms lets a caller lay
          out a nested graph by name, additively, while guaranteeing that a graph with no nesting is
          placed exactly as the selected leaf algorithm would place it so no existing output changes.
        children:
          - Rendering-Layout-HierarchicalLayout-Identity
          - Rendering-Layout-HierarchicalLayout-FlatEquivalence
          - Rendering-Layout-HierarchicalLayout-NestsChildren
          - Rendering-Layout-HierarchicalLayout-PerNodeAlgorithm
          - Rendering-Layout-HierarchicalLayout-HierarchyHandling
          - Rendering-Layout-HierarchicalLayout-CrossContainerEdge
          - Rendering-Layout-HierarchicalLayout-Validation
        tests:
          - Id_IsHierarchical
          - Apply_FlatRandomGraphs_MatchLayeredAlgorithmExactly

      - id: Rendering-Layout-DefaultLayout
        title: >-
          The rendering layout system shall provide a batteries-included facade that lays out a layout
          graph with the algorithm the graph or options declares, resolved from the bundled algorithms,
          defaulting to the hierarchical engine so both flat and nested graphs lay out from one call.
        justification: |
          The most common request — "lay out my graph with whatever algorithm it declares" — should be a
          single call, not a registry-assembly exercise. Exposing a default registry factory and a thin
          layout facade that defaults to the hierarchical engine lets a caller lay out either a flat or a
          nested graph without choosing an engine, while preserving every existing output because the
          hierarchical engine is byte-identical to the leaf algorithm for a flat graph.
        children:
          - Rendering-Layout-DefaultRegistry-BundledAlgorithms
          - Rendering-Layout-LayoutEngine-DefaultAlgorithm
          - Rendering-Layout-LayoutEngine-Resolution
          - Rendering-Layout-LayoutEngine-FlatEquivalence
          - Rendering-Layout-LayoutEngine-NestedComposition
          - Rendering-Layout-LayoutEngine-CustomRegistry
          - Rendering-Layout-LayoutEngine-Validation
        tests:
          - CreateDefaultRegistry_RegistersOnlyTheThreeBundledAlgorithms
          - Layout_FlatGraphNoAlgorithmDeclared_MatchesLayeredLeafExactly

  - title: Engine Subsystem Requirements
    requirements:
      - id: Rendering-Layout-OrthogonalRouting
        title: >-
          The Rendering.Layout engine subsystem shall route individual orthogonal connectors between
          two anchors, steering around obstacles by a caller-specified clearance.
        justification: |
          Connector quality throughout every produced diagram flows through a single reusable
          orthogonal router, so its obstacle-avoidance and clearance behavior is an engine-subsystem
          capability in its own right.
        children:
          - Rendering-Layout-OrthogonalEdgeRouter-Orthogonal
          - Rendering-Layout-OrthogonalEdgeRouter-AvoidObstacles
          - Rendering-Layout-OrthogonalEdgeRouter-Clearance
          - Rendering-Layout-OrthogonalEdgeRouter-PerpendicularEnds
          - Rendering-Layout-OrthogonalEdgeRouter-CrossingStatus
          - Rendering-Layout-OrthogonalEdgeRouter-CostBands
        tests:
          - Route_NoObstacles_ProducesOrthogonalPath
          - Route_ObstacleBetween_RoutesAround

      - id: Rendering-Layout-Containment
        title: >-
          The Rendering.Layout engine subsystem shall pack a sequence of variable-size items into
          rows within a width budget without overlap.
        justification: |
          Containment packing lays out child elements inside a containing box; providing it as a
          reusable engine keeps container sizing consistent across every view that nests elements.
        children:
          - Rendering-Layout-ContainmentPacker-SingleRow
          - Rendering-Layout-ContainmentPacker-Wrapping
          - Rendering-Layout-ContainmentPacker-NoOverlap
          - Rendering-Layout-ContainmentPacker-WithinBounds
          - Rendering-Layout-ContainmentPacker-OversizedItem
          - Rendering-Layout-ContainmentPacker-EmptyInput
          - Rendering-Layout-ContainmentPacker-SingleItem
        tests:
          - Pack_MixedSizes_ProducesNoOverlaps
          - Pack_ItemsFitInRow_ShareSameRow

      - id: Rendering-Layout-Interconnection
        title: >-
          The Rendering.Layout engine subsystem shall place directed graphs using Sugiyama-style
          layered layout and return one orthogonal connector route per input edge.
        justification: |
          Layered placement with per-edge routing is the geometric contract the public algorithm and
          the interconnection view depend on; exposing it as a stable facade lets both consume the
          same behavior-preserving engine.
        children:
          - Rendering-Layout-InterconnectionEngine-Layering
          - Rendering-Layout-InterconnectionEngine-NonOverlapping
          - Rendering-Layout-InterconnectionEngine-DummyNodes
          - Rendering-Layout-InterconnectionEngine-Waypoints
          - Rendering-Layout-InterconnectionEngine-Deterministic
        tests:
          - Place_LinearChain_MonotonicLayerAssignment
          - Place_WorkstationTopology_CorrectLayersAndNoOverlap

  - title: OrthogonalEdgeRouter Unit Requirements
    requirements:
      - id: Rendering-Layout-OrthogonalEdgeRouter-Orthogonal
        title: >-
          OrthogonalEdgeRouter shall produce a path of axis-aligned segments connecting the source anchor
          to the target anchor.
        justification: |
          Orthogonal (axis-aligned) connectors are the convention for the block, state, and activity
          diagrams the library renders. Consecutive waypoints therefore always share an X or a Y
          coordinate.
        tests:
          - Route_NoObstacles_ProducesOrthogonalPath
          - Route_AlignedEndpoints_ProducesStraightLine

      - id: Rendering-Layout-OrthogonalEdgeRouter-AvoidObstacles
        title: >-
          When an obstacle-free path exists, OrthogonalEdgeRouter shall route around obstacle rectangles
          without passing through their interiors.
        justification: |
          Connectors that cut through unrelated boxes are unreadable. The router must steer segments
          around obstacles whenever the geometry allows.
        tests:
          - Route_ObstacleBetween_RoutesAround
          - Route_MultipleObstacles_RemainsValid
          - RouteWithStatus_ObstacleBetween_RoutesAroundWithoutCrossing

      - id: Rendering-Layout-OrthogonalEdgeRouter-Clearance
        title: >-
          When an obstacle-free path is achievable, OrthogonalEdgeRouter shall keep routed segments clear
          of obstacles by the caller-specified clearance distance.
        justification: |
          A connector that grazes the edge of a box reads as touching it. Honoring a clearance keeps
          visible breathing space between connectors and unrelated boxes.
        tests:
          - RouteWithStatus_CleanRoute_KeepsClearanceFromObstacles

      - id: Rendering-Layout-OrthogonalEdgeRouter-PerpendicularEnds
        title: >-
          When an anchor is given with the box side it sits on, OrthogonalEdgeRouter shall leave or enter
          that anchor with a segment perpendicular to the side.
        justification: |
          Connectors that meet a box edge at a right angle read as attached to the box rather than
          sliding along its border, matching diagram notation conventions.
        tests:
          - Route_WithSourceSide_LeavesPerpendicular
          - Route_WithTargetSide_EntersPerpendicular

      - id: Rendering-Layout-OrthogonalEdgeRouter-CrossingStatus
        title: >-
          OrthogonalEdgeRouter shall report whether the produced path could not be routed without crossing
          an obstacle.
        justification: |
          When geometry forces a connector through a box (for example an enclosed target), callers
          need to know so the condition can be surfaced as a layout warning rather than silently
          producing a misleading diagram.
        tests:
          - RouteWithStatus_NoBlockingObstacle_ReportsNotCrossed
          - RouteWithStatus_TargetEnclosedByObstacle_ReportsCrossed

      - id: Rendering-Layout-OrthogonalEdgeRouter-CostBands
        title: >-
          When cost bands are supplied, OrthogonalEdgeRouter shall prefer routing through a cheaper band
          over an equal-length alternative outside it.
        justification: |
          Highway bundling depends on a cost discount so parallel wires share a corridor; the router
          must bias toward discounted bands while keeping null bands neutral.
        tests:
          - RouteWithStatus_HighwayBand_PrefersBandedDetour

  - title: ContainmentPacker Unit Requirements
    requirements:
      - id: Rendering-Layout-ContainmentPacker-SingleRow
        title: >-
          ContainmentPacker shall place items that together fit within the maximum content width on
          a single row.
        justification: |
          When the available width can hold all the items, splitting them across rows would waste
          vertical space. Items that fit must share one row, ordered left to right.
        tests:
          - Pack_ItemsFitInRow_ShareSameRow

      - id: Rendering-Layout-ContainmentPacker-Wrapping
        title: >-
          ContainmentPacker shall wrap an item that would exceed the maximum content width onto a
          new row positioned below the current row.
        justification: |
          A row may not grow past the width budget. When the next item would overflow it, the packer
          must start a new row beneath the current one so the content stays within the allotted width.
        tests:
          - Pack_ItemsExceedWidth_WrapToNewRow

      - id: Rendering-Layout-ContainmentPacker-NoOverlap
        title: >-
          ContainmentPacker shall position items so that no two packed rectangles overlap.
        justification: |
          Overlapping items hide one another. Whatever mix of sizes is supplied, every packed
          rectangle must be disjoint from every other.
        tests:
          - Pack_MixedSizes_ProducesNoOverlaps

      - id: Rendering-Layout-ContainmentPacker-WithinBounds
        title: >-
          ContainmentPacker shall place every packed rectangle within the bounds of the region size
          it reports.
        justification: |
          Callers size the container from the reported region width and height. Every packed
          rectangle must lie inside those bounds so that nothing is clipped or drawn outside the
          container.
        tests:
          - Pack_MixedSizes_AllRectsWithinBounds

      - id: Rendering-Layout-ContainmentPacker-OversizedItem
        title: >-
          ContainmentPacker shall place an item wider than the maximum content width alone on its
          own row and shall widen the region to contain it.
        justification: |
          An item that cannot fit the width budget still has to be placed. It must occupy its own
          row, and the reported region must grow so the oversized item remains fully contained.
        tests:
          - Pack_ItemWiderThanContentWidth_PlacedAloneAndRegionWidens

      - id: Rendering-Layout-ContainmentPacker-EmptyInput
        title: >-
          When given no items, ContainmentPacker shall return an empty result whose region consists
          solely of the requested padding.
        justification: |
          An empty input is a valid degenerate case. The packer must return a well-formed, empty
          result sized only by the padding rather than failing.
        tests:
          - Pack_EmptyList_ReturnsPaddingOnlyRegion

      - id: Rendering-Layout-ContainmentPacker-SingleItem
        title: >-
          When given a single item, ContainmentPacker shall place it at the padding origin and size
          the region to that item plus padding.
        justification: |
          A lone item has a predictable home: the padding origin, with the region sized to wrap it
          exactly plus the requested padding on each side.
        tests:
          - Pack_SingleItem_PositionsAtPaddingOrigin

  - title: InterconnectionLayoutEngine Unit Requirements
    requirements:
      - id: Rendering-Layout-InterconnectionEngine-Layering
        title: >-
          InterconnectionLayoutEngine shall assign layer indices using longest-path layering so that
          every connected pair of nodes occupies different layers.
        justification: |
          Longest-path layering guarantees no same-layer connections, eliminating the connector
          clipping that occurred with the earlier breadth-first approach.
        tests:
          - Place_LinearChain_MonotonicLayerAssignment
          - Place_WorkstationTopology_CorrectLayersAndNoOverlap

      - id: Rendering-Layout-InterconnectionEngine-NonOverlapping
        title: >-
          InterconnectionLayoutEngine shall produce node rectangles that do not overlap.
        justification: |
          Overlapping boxes prevent readable diagrams; the layered column structure and per-column
          vertical stacking guarantee non-overlap by construction.
        tests:
          - Place_WorkstationTopology_CorrectLayersAndNoOverlap

      - id: Rendering-Layout-InterconnectionEngine-DummyNodes
        title: >-
          InterconnectionLayoutEngine shall insert dummy nodes for long edges (span greater than
          one) and exclude them from the returned rectangles so the rect count equals the input node
          count.
        justification: |
          Dummy nodes force routing through the correct inter-layer corridors, preventing connector
          lines from clipping intermediate boxes. They must not appear as layout boxes in the output.
        tests:
          - Place_LongEdge_RectCountEqualsInputNodeCount
          - Place_LongEdge_RoutesViaDummyNodesWithinBounds

      - id: Rendering-Layout-InterconnectionEngine-Waypoints
        title: >-
          InterconnectionLayoutEngine shall return one waypoint list per input edge; a span-one edge
          produces a straight two-waypoint path and a long edge routes via dummy nodes within the
          layout bounds.
        justification: |
          Pre-computed waypoints allow the public algorithm and the interconnection view to emit
          connector lines without any additional routing logic.
        tests:
          - Place_SingleEdge_ProducesStraightTwoWaypointPath
          - Place_LongEdge_RoutesViaDummyNodesWithinBounds

      - id: Rendering-Layout-InterconnectionEngine-Deterministic
        title: >-
          Given identical input, InterconnectionLayoutEngine shall produce identical geometry and
          waypoints on every invocation.
        justification: |
          Reproducible layout is required so regenerating a view from unchanged input does not shift
          boxes or change connector routes.
        tests:
          - Place_LinearChain_MonotonicLayerAssignment
          - Place_WorkstationTopology_CorrectLayersAndNoOverlap

  - title: Layered Pipeline Unit Requirements
    requirements:
      - id: Rendering-Layout-LayeredPipeline-StagedPipeline
        title: >-
          The layered pipeline shall compute a layout by running an ordered sequence of composable
          stages, each implementing a common stage interface, over a single shared graph state.
        justification: |
          Expressing the algorithm as ordered, independently testable stages lets the pipeline be
          extended, reordered, and verified one stage at a time instead of as one monolithic method.
        tests:
          - LayeredLayoutPipeline_RunDefaultStages_ChainGraph_PopulatesWaypointsWithoutThrowing
          - Pipeline_MatchesLegacyOracle_OnRandomGraphs

      - id: Rendering-Layout-LayeredPipeline-BehaviorPreserving
        title: >-
          The layered pipeline shall produce the same rectangles, totals, layer assignments, and
          connector waypoints as the legacy monolithic interconnection engine for every input.
        justification: |
          The pipeline was extracted from the monolithic engine as a behavior-preserving refactor;
          identical geometry is required so existing views render unchanged.
        tests:
          - Pipeline_MatchesLegacyOracle_OnRandomGraphs
          - Pipeline_MatchesLegacyOracle_OnEmptyGraph
          - Pipeline_MatchesLegacyOracle_OnDroneLikeGraph
          - Pipeline_MatchesLegacyOracle_OnWorkstationLikeGraph
          - Pipeline_MatchesLegacyOracle_OnNamedTopologies

      - id: Rendering-Layout-LayeredPipeline-FlatHierarchyOnly
        title: >-
          The layered pipeline shall support flat (single-graph) hierarchy handling and shall reject
          recursive hierarchy handling with a clear error until it is implemented.
        justification: |
          Flat handling reproduces the current behavior exactly; failing fast on the unimplemented
          recursive mode prevents silently producing an unsupported layout.
        tests:
          - LayeredLayoutPipeline_Build_RecursiveHierarchy_ThrowsNotSupportedException

      - id: Rendering-Layout-LayeredPipeline-Directions
        title: >-
          The layered pipeline shall support laying out graphs in the right, down, left, and up flow
          directions, mapping the abstract left-to-right computation onto screen coordinates for the
          requested direction via the axis-transform stage.
        justification: |
          The stages compute in the left-to-right abstract axes and the axis transform maps the
          result onto the requested direction; directed views rely on the down direction, so all
          four directions must be supported.
        tests:
          - AxisTransform_Apply_RightDirection_LeavesCoordinatesUnchanged
          - AxisTransform_Apply_Right_PlacesTargetEastWithCorrectFaces
          - AxisTransform_Apply_Down_PlacesTargetSouthWithCorrectFaces
          - AxisTransform_Apply_Left_PlacesTargetWestWithCorrectFaces
          - AxisTransform_Apply_Up_PlacesTargetNorthWithCorrectFaces

      - id: Rendering-Layout-LayeredPipeline-OrthogonalConnectors
        title: >-
          The layered pipeline shall emit connector waypoints composed solely of axis-aligned
          segments in every supported flow direction.
        justification: |
          Orthogonal connectors are the diagram convention; after mapping to any of the four screen
          directions, consecutive waypoints must still share an X or a Y coordinate.
        tests:
          - AxisTransform_Apply_Right_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Down_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Left_ProducesOrthogonalWaypoints
          - AxisTransform_Apply_Up_ProducesOrthogonalWaypoints

      - id: Rendering-Layout-LayeredPipeline-CycleBreaking
        title: >-
          The cycle-breaking stage shall reverse cycle-causing edges to produce an acyclic edge set
          and shall drop self-loops and duplicate directed edges.
        justification: |
          Longest-path layering requires an acyclic graph; reversing back edges and discarding
          self-loops and duplicates yields the acyclic edge set the later stages assume.
        tests:
          - CycleBreaker_Apply_GraphWithCycle_ProducesAcyclicEdgeSet
          - CycleBreaker_Apply_SelfLoopsAndDuplicates_AreRemoved

      - id: Rendering-Layout-LayeredPipeline-LayerAssignment
        title: >-
          The layer-assignment stage shall assign each node the longest-path layer index so that
          every edge runs from a strictly lower layer to a strictly higher layer.
        justification: |
          Longest-path layering places every node as far right as its dependencies allow, guaranteeing
          monotonic layer progression and preventing same-layer connections.
        tests:
          - LayerAssigner_Apply_LinearChain_AssignsMonotonicLayers
          - LayerAssigner_Apply_DiamondGraph_AssignsLongestPathLayers

      - id: Rendering-Layout-LayeredPipeline-LongEdgeSplitting
        title: >-
          The long-edge-splitting stage shall insert one dummy node per intermediate layer for each
          edge spanning more than one layer and shall add no dummy node for a span-one edge.
        justification: |
          Dummy nodes reserve inter-layer corridors so long connectors route around, rather than
          through, the boxes of intervening layers.
        tests:
          - LongEdgeSplitter_Apply_SpanOneEdge_AddsNoDummyNodes
          - LongEdgeSplitter_Apply_LongEdge_InsertsDummyNodesPerIntermediateLayer

      - id: Rendering-Layout-LayeredPipeline-CrossingMinimization
        title: >-
          The crossing-minimization stage shall order the augmented nodes within each layer to reduce
          edge crossings while retaining every augmented node in its layer group.
        justification: |
          Fewer edge crossings produce a more readable diagram; the ordering must reduce crossings
          without ever losing a node from its layer.
        tests:
          - CrossingMinimizer_Apply_CrossingProneOrdering_ReducesCrossings
          - CrossingMinimizer_Apply_TwoLayerGraph_GroupsNodesByLayer
          - CrossingMinimizer_Apply_AllAugmentedNodesAppearInGroups

      - id: Rendering-Layout-LayeredPipeline-CoordinateAssignment
        title: >-
          The coordinate-assignment stage shall assign every augmented node absolute coordinates with
          layer columns ordered left to right and forks centered between their targets.
        justification: |
          Brandes-Kopf placement fixes each node's position with layers as ordered columns and
          symmetric structures centered, giving the diagram its balanced final geometry.
        tests:
          - BrandesKopfPlacer_Apply_ChainGraph_AssignsCoordinateArrays
          - BrandesKopfPlacer_Apply_ColumnsAreLeftToRightInLayerOrder
          - BrandesKopfPlacer_Apply_SymmetricFork_CentersSourceBetweenTargets

      - id: Rendering-Layout-LayeredPipeline-PortDistribution
        title: >-
          The port-distribution stage shall assign each sub-edge a source-side and target-side port
          that lies within the corresponding node face.
        justification: |
          Distributing ports along box faces keeps parallel connectors from overlapping and ensures
          every sub-edge leaves and enters within the bounds of its node's face.
        tests:
          - PortDistributor_Apply_SingleEdge_PortsLieWithinNodeFaces
          - PortDistributor_Apply_AssignsPortYForEverySubEdge

      - id: Rendering-Layout-LayeredPipeline-OrthogonalRouting
        title: >-
          The orthogonal-routing stage shall emit axis-aligned bend points per corridor, producing no
          bend points for a straight sub-edge.
        justification: |
          Slot-based orthogonal routing gives every connector its right-angled shape; a sub-edge whose
          endpoints already align needs no bends.
        tests:
          - OrthogonalRouter_Apply_StraightEdge_ProducesNoBendPoints
          - OrthogonalRouter_Apply_EveryBendListIsEmptyOrVerticalSegment

      - id: Rendering-Layout-LayeredPipeline-BackEdgeApproach
        title: >-
          The orthogonal-routing stage shall reserve at least the configured back-edge entry approach
          for a reversed edge's final segment, defaulting to a value that leaves forward geometry
          byte-identical to the legacy engine.
        justification: |
          A decoration-aware caller can lengthen the reversed-edge approach so an end marker clears the
          box, while the default keeps forward and acyclic geometry unchanged.
        tests:
          - OrthogonalRouter_DefaultApproach_IsByteIdenticalToLegacy
          - OrthogonalRouter_CustomApproach_PushesEntryStubOutward
          - OrthogonalRouter_ReversedEdge_DefaultApproachClearsClearance
          - OrthogonalRouter_ForwardEdges_GeometryUnchanged
          - OrthogonalRouter_AcyclicGraph_NoApproachChange
          - OrthogonalRouter_DecorationAwareApproach_ClearsMarkerAlongLength

      - id: Rendering-Layout-LayeredPipeline-LongEdgeJoining
        title: >-
          The long-edge-joining stage shall concatenate the bend points of a split edge's sub-edges
          into one polyline per original edge.
        justification: |
          A long edge split across dummy nodes must be reassembled into a single connector polyline so
          consumers see one route per original edge.
        tests:
          - LongEdgeJoiner_Apply_SingleEdge_ProducesWaypointsPerOriginalEdge
          - LongEdgeJoiner_Apply_LongEdge_ConcatenatesSubEdgeBendPoints

      - id: Rendering-Layout-LayeredPipeline-ComponentPacking
        title: >-
          The component-packing stage shall lay out each connected component independently and pack
          the components without overlap in a deterministic order.
        justification: |
          Disconnected graphs must place each component with its own layered layout and then arrange
          the components compactly and reproducibly so nothing overlaps.
        tests:
          - ComponentPacker_Apply_DisconnectedSingletons_PackSeparately
          - ComponentPacker_Apply_ConnectedCore_StaysOneComponent
          - ComponentPacker_Apply_SingleComponent_EqualsDefaultPipeline
          - ComponentPacker_Apply_ComponentOrder_IsDeterministic
          - ComponentPacker_Apply_Waypoints_TranslatedWithComponent
          - ComponentPacker_Apply_EmptyGraph_IsNoOp
          - ComponentPacker_Apply_SingleComponent_ParallelAndSelfEdges_ProducesAlignedWaypoints
          - ComponentPacker_Apply_MultiComponent_ParallelAndSelfEdges_MergesAlignedWaypoints

      - id: Rendering-Layout-LayeredPipeline-SharedState
        title: >-
          The layered graph shall carry the mutable shared state threaded through every stage and
          shall reject construction with null nodes or null edges.
        justification: |
          A single shared state object replaces the ad-hoc locals of the monolithic engine; rejecting
          null inputs at construction keeps every downstream stage operating on valid state.
        tests:
          - LayeredGraph_Constructor_ValidInput_StoresNodesEdgesDirectionAndCount
          - LayeredGraph_Constructor_NullNodes_ThrowsArgumentNullException
          - LayeredGraph_Constructor_NullEdges_ThrowsArgumentNullException

      - id: Rendering-Layout-LayeredPipeline-InputValidation
        title: >-
          The layered pipeline shall reject a null stage when assembled and a null graph when run,
          throwing an argument-null error in each case.
        justification: |
          Failing fast on null construction and run arguments prevents malformed pipelines from
          silently producing incorrect or partial layouts.
        tests:
          - LayeredLayoutPipeline_AddStage_NullStage_ThrowsArgumentNullException
          - LayeredLayoutPipeline_Run_NullGraph_ThrowsArgumentNullException

  - title: LayeredLayoutAlgorithm Unit Requirements
    requirements:
      - id: Rendering-Layout-LayeredAlgorithm-Identity
        title: >-
          LayeredLayoutAlgorithm shall expose the stable identifier under which it is selected and
          registered.
        justification: |
          Renderers and registries select an algorithm by its identifier; a stable, well-known value
          lets the layered algorithm be resolved by name.
        tests:
          - Id_IsLayered

      - id: Rendering-Layout-LayeredAlgorithm-PlacesAndRoutes
        title: >-
          LayeredLayoutAlgorithm shall convert a layout graph into a placed layout tree with one box
          per node and one orthogonally routed connector per edge.
        justification: |
          The algorithm is the public bridge from an abstract graph to concrete geometry; every node
          must become a placed box and every edge a routed connector for renderers to draw.
        tests:
          - Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges

      - id: Rendering-Layout-LayeredAlgorithm-EmptyGraph
        title: >-
          When given a graph with no nodes, LayeredLayoutAlgorithm shall return an empty placed
          layout tree.
        justification: |
          An empty graph is a valid degenerate case that must yield a well-formed empty canvas rather
          than an error.
        tests:
          - Apply_EmptyGraph_ReturnsEmptyCanvas

      - id: Rendering-Layout-LayeredAlgorithm-Validation
        title: >-
          LayeredLayoutAlgorithm shall reject a null graph or null options argument with an
          argument-null error.
        justification: |
          Failing fast on null arguments prevents undefined behavior and surfaces caller errors at the
          public boundary.
        tests:
          - Apply_NullGraph_Throws
          - Apply_NullOptions_Throws

  - title: EdgeRouting Option Unit Requirements
    requirements:
      - id: Rendering-Layout-EdgeRouting-Selection
        title: >-
          The connector routing style shall be selectable per scope through the
          rendering.edgerouting property key, which shall default to orthogonal routing when unset.
        justification: |
          Mirroring ELK's elk.edgeRouting, routing style rides the same open property system that
          selects the algorithm, so any scope (graph, node, edge, or a free-standing options object)
          can choose a style. An unset scope must fall back to the orthogonal default so existing
          callers route orthogonally without opting in.
        tests:
          - CoreOptions_EdgeRouting_DefaultsToOrthogonal
          - CoreOptions_EdgeRouting_HasStableId
          - CoreOptions_EdgeRouting_SelectablePerScope
          - CoreOptions_EdgeRouting_UnsetReturnsDefault

      - id: Rendering-Layout-EdgeRouting-Defaults
        title: >-
          The connector route options shall default to orthogonal routing with a caller-overridable
          clearance of twelve logical pixels.
        justification: |
          A caller that supplies no routing preference must still get a sensible route; defaulting to
          orthogonal routing with a fixed clearance provides that, while allowing the clearance to be
          overridden so a downstream adapter can reproduce a specific spacing.
        tests:
          - ConnectorRouteOptions_Defaults_AreOrthogonalWithTwelvePixelClearance

  - title: ConnectorRouter Unit Requirements
    requirements:
      - id: Rendering-Layout-ConnectorRouter-AnchorsFaceEachOther
        title: >-
          ConnectorRouter shall anchor each connector on the box side whose outward normal best points
          at the opposing box, so connectors leave and arrive on the faces the two boxes present to
          each other.
        justification: |
          A connector reads as joining two boxes only when it leaves and enters the faces that point
          at one another; anchoring toward the opposing box centre produces that presentation
          regardless of the boxes' relative positions.
        tests:
          - Route_TargetToTheRight_AnchorsFaceEachOther
          - Route_TargetBelow_AnchorsFaceEachOther

      - id: Rendering-Layout-ConnectorRouter-AvoidsObstacles
        title: >-
          ConnectorRouter shall route a connector around an intervening box without passing through
          that box's interior, using axis-aligned segments.
        justification: |
          Connectors that cut through unrelated boxes are unreadable; the orchestration must steer the
          route around boxes that lie between the two endpoints while keeping the path orthogonal.
        tests:
          - Route_ObstacleBetweenEndpoints_RoutesAroundInterior

      - id: Rendering-Layout-ConnectorRouter-ExcludesEndpoints
        title: >-
          ConnectorRouter shall exclude a connection's two endpoint boxes, matched by instance
          identity, from the obstacle set used to route that connection.
        justification: |
          A connector must be free to leave and enter the boxes it joins; treating the endpoint boxes
          as obstacles would block the connector's own anchors. Endpoints are matched by reference so
          no domain concept enters the routing.
        tests:
          - Route_EndpointBoxes_AreExcludedFromObstacles

      - id: Rendering-Layout-ConnectorRouter-CarriesStyling
        title: >-
          ConnectorRouter shall carry a connection's requested target end marker, line style, and
          label onto the produced connector line and shall leave the source end unmarked.
        justification: |
          The routing orchestration owns only geometry; the caller's styling choices must survive onto
          the placed line so renderers draw the intended arrowhead, stroke, and label.
        tests:
          - Route_Connection_CarriesRequestedStyling

      - id: Rendering-Layout-ConnectorRouter-BatchOrder
        title: >-
          Given a list of connections, ConnectorRouter shall return one routed connector line per
          connection in the input order.
        justification: |
          Callers correlate produced lines with their connections positionally; a stable one-to-one,
          in-order result keeps that correlation unambiguous.
        tests:
          - Route_MultipleConnections_ReturnsOneLinePerConnectionInOrder

      - id: Rendering-Layout-ConnectorRouter-Validation
        title: >-
          ConnectorRouter shall reject a null box list, connection list, connection, or options
          argument with an argument-null error.
        justification: |
          Failing fast on null arguments prevents undefined behavior and surfaces caller errors at the
          public routing boundary.
        tests:
          - Route_NullBoxes_Throws
          - Route_NullConnections_Throws
          - Route_NullOptions_Throws
          - Route_NullConnection_Throws

  - title: ContainmentLayout Unit Requirements
    requirements:
      - id: Rendering-Layout-ContainmentLayout-Order
        title: >-
          ContainmentLayout shall return the packed child boxes in their input order, positioned left to
          right along each row.
        justification: |
          Callers rely on stable, order-preserving packing so a box's position in the input predicts its
          reading position in the container; the repositioned children must appear in the same order they
          were supplied.
        tests:
          - Pack_ItemsFitInRow_PreservesOrderLeftToRight

      - id: Rendering-Layout-ContainmentLayout-NoOverlap
        title: >-
          ContainmentLayout shall position packed child boxes so that no two of them overlap.
        justification: |
          Overlapping children hide one another. Whatever mix of sizes is supplied, every packed box must
          be disjoint from every other.
        tests:
          - Pack_MixedSizes_ProducesNoOverlaps

      - id: Rendering-Layout-ContainmentLayout-WithinRegion
        title: >-
          ContainmentLayout shall place every packed child box within the bounds of the region size it
          reports.
        justification: |
          Callers size the container from the reported region width and height. Every packed box must lie
          inside those bounds so nothing is clipped or drawn outside the container.
        tests:
          - Pack_MixedSizes_AllChildrenWithinRegion

      - id: Rendering-Layout-ContainmentLayout-Wrapping
        title: >-
          ContainmentLayout shall wrap a child that would exceed the maximum content width onto a new row
          positioned below the current row.
        justification: |
          A row may not grow past the width budget. When the next child would overflow it, the operation
          must start a new row beneath the current one so the content stays within the allotted width.
        tests:
          - Pack_ChildExceedsWidth_WrapsToNewRow

      - id: Rendering-Layout-ContainmentLayout-OversizedChild
        title: >-
          ContainmentLayout shall place a child wider than the maximum content width alone on its own row
          and shall widen the region to contain it.
        justification: |
          A child that cannot fit the width budget still has to be placed. It must occupy its own row, and
          the reported region must grow so the oversized child remains fully contained.
        tests:
          - Pack_OversizedChild_PlacedAloneAndRegionWidens

      - id: Rendering-Layout-ContainmentLayout-EmptyInput
        title: >-
          When given no children, ContainmentLayout shall return no children and a region consisting
          solely of the requested padding.
        justification: |
          An empty input is a valid degenerate case. The operation must return a well-formed, empty result
          sized only by the padding rather than failing.
        tests:
          - Pack_EmptyInput_ReturnsPaddingOnlyRegion

      - id: Rendering-Layout-ContainmentLayout-PreservesFields
        title: >-
          ContainmentLayout shall carry every non-position field of each child (label, depth, shape,
          compartments, nested children, and keyword) unchanged onto the repositioned box, updating only
          its X and Y coordinates.
        justification: |
          The operation adjusts placement only; a child's identity and content must survive so the packed
          boxes render exactly as supplied, just relocated to their packed coordinates.
        tests:
          - Pack_PreservesNonPositionFields

      - id: Rendering-Layout-ContainmentLayout-Defaults
        title: >-
          The containment options shall default the horizontal gap and vertical gap to eight logical
          pixels and the padding to twelve logical pixels, so a caller need only supply the content width.
        justification: |
          Sensible spacing defaults let a caller pack boxes with a single required parameter while still
          allowing each gap and the padding to be overridden to reproduce a specific container spacing.
        tests:
          - ContainmentOptions_Defaults_AreSensibleGapsAndPadding

      - id: Rendering-Layout-ContainmentLayout-Validation
        title: >-
          ContainmentLayout shall reject a null children list, a null options argument, or a null child
          element with an argument-null error.
        justification: |
          Failing fast on null arguments prevents undefined behavior and surfaces caller errors at the
          public packing boundary.
        tests:
          - Pack_NullChildren_Throws
          - Pack_NullOptions_Throws
          - Pack_NullChildElement_Throws

  - title: ContainmentLayoutAlgorithm Unit Requirements
    requirements:
      - id: Rendering-Layout-ContainmentAlgorithm-Identity
        title: >-
          ContainmentLayoutAlgorithm shall expose the stable identifier under which it is selected and
          registered.
        justification: |
          Renderers and registries select an algorithm by its identifier; a stable, well-known value
          lets the containment algorithm be resolved by name alongside the layered algorithm.
        tests:
          - Id_IsContainment

      - id: Rendering-Layout-ContainmentAlgorithm-PacksNodes
        title: >-
          ContainmentLayoutAlgorithm shall place one box per top-level node, in input order and without
          overlap, entirely within the canvas it reports.
        justification: |
          The algorithm's core arrangement is order-preserving row packing; every node must become a
          placed box that renders inside the reported canvas and does not obscure any other box.
        tests:
          - Apply_Graph_PacksNodesNonOverlappingInInputOrderWithinCanvas

      - id: Rendering-Layout-ContainmentAlgorithm-RoutesEdges
        title: >-
          ContainmentLayoutAlgorithm shall emit one routed connector per input edge, carrying that
          edge's target end marker, line style, and label.
        justification: |
          A diagram's edges must be drawn as well as its nodes; each edge becomes a routed connector
          that preserves its requested styling so renderers reproduce the intended notation.
        tests:
          - Apply_Graph_RoutesOneConnectorPerEdgeCarryingStyling

      - id: Rendering-Layout-ContainmentAlgorithm-RoutesAroundObstacle
        title: >-
          ContainmentLayoutAlgorithm shall route an edge whose endpoints are separated by an intervening
          packed box around that box rather than through its interior.
        justification: |
          The value of routing edges among packed nodes is obstacle avoidance; an edge crossing an
          intervening box would be ambiguous, so the connector must steer around the box.
        tests:
          - Apply_EdgeCrossingInterveningBox_RoutesAroundIt

      - id: Rendering-Layout-ContainmentAlgorithm-EmptyGraph
        title: >-
          When given a graph with no nodes, ContainmentLayoutAlgorithm shall return an empty placed
          layout tree with a positive-size canvas.
        justification: |
          An empty graph is a valid degenerate case that must yield a well-formed empty canvas rather
          than an error or a zero-size result.
        tests:
          - Apply_EmptyGraph_ReturnsEmptyCanvas

      - id: Rendering-Layout-ContainmentAlgorithm-SkipsOutOfGraphEdges
        title: >-
          ContainmentLayoutAlgorithm shall skip any edge whose source or target is not a top-level node
          of the graph.
        justification: |
          Edges may reference descendant nodes that this flat algorithm does not place; skipping such
          out-of-graph endpoints keeps routing well-defined and mirrors the layered algorithm's handling.
        tests:
          - Apply_EdgeReferencingOutOfGraphNode_IsSkipped

      - id: Rendering-Layout-ContainmentAlgorithm-Validation
        title: >-
          ContainmentLayoutAlgorithm shall reject a null graph or null options argument with an
          argument-null error.
        justification: |
          Failing fast on null arguments prevents undefined behavior and surfaces caller errors at the
          public algorithm boundary.
        tests:
          - Apply_NullGraph_Throws
          - Apply_NullOptions_Throws

  - title: HierarchicalLayoutAlgorithm Unit Requirements
    requirements:
      - id: Rendering-Layout-HierarchicalLayout-Identity
        title: >-
          HierarchicalLayoutAlgorithm shall expose the stable identifier under which it is selected and
          registered.
        justification: |
          Renderers and registries select an algorithm by its identifier; a stable, well-known value
          lets the hierarchical engine be resolved by name alongside the leaf algorithms.
        tests:
          - Id_IsHierarchical

      - id: Rendering-Layout-HierarchicalLayout-FlatEquivalence
        title: >-
          When given a graph in which no node is a container, HierarchicalLayoutAlgorithm shall produce
          a placed layout tree identical to the selected leaf algorithm applied to the same graph.
        justification: |
          The engine is purely additive: a flat graph must lay out exactly as it did before the
          hierarchical engine existed, so selecting the engine can never change any existing output.
        tests:
          - Apply_FlatRandomGraphs_MatchLayeredAlgorithmExactly
          - Apply_FlatRandomGraphs_MatchContainmentAlgorithmExactly

      - id: Rendering-Layout-HierarchicalLayout-NestsChildren
        title: >-
          HierarchicalLayoutAlgorithm shall place a container node's children within that container's
          bounds and size the container to enclose them.
        justification: |
          Nested content is only meaningful when it renders inside its container; sizing each container
          to its children and positioning the children within its bounds is the engine's core behavior.
        tests:
          - Apply_TwoLevelNesting_SizesContainerAndNestsChildrenAbsolutely
          - Apply_ThreeLevelNesting_Succeeds

      - id: Rendering-Layout-HierarchicalLayout-PerNodeAlgorithm
        title: >-
          HierarchicalLayoutAlgorithm shall lay out each scope with the algorithm selected on that scope,
          allowing a container to be arranged by a different algorithm than its parent.
        justification: |
          Different levels of a diagram suit different arrangements; letting each container select its
          own algorithm — inheriting the parent's when unset — lets, for example, a packed container hold
          a layered one without either level knowing about the other.
        tests:
          - Apply_ContainmentRootWithLayeredContainer_Composes
          - Apply_LayeredRootWithContainmentContainer_Composes

      - id: Rendering-Layout-HierarchicalLayout-HierarchyHandling
        title: >-
          HierarchicalLayoutAlgorithm shall lay out each container's children in their own coordinate
          space and compose them into the parent at absolute coordinates.
        justification: |
          Laying out each container independently and then composing it into its parent keeps container
          placements deterministic and lets sub-layouts be reused as self-contained regions, mirroring
          the separate-children hierarchy-handling mode.
        tests:
          - Apply_TwoLevelNesting_SizesContainerAndNestsChildrenAbsolutely
          - Apply_CompoundGraph_DoesNotMutateInputNodeSizes

      - id: Rendering-Layout-HierarchicalLayout-CrossContainerEdge
        title: >-
          HierarchicalLayoutAlgorithm shall route an edge whose endpoints live in different containers at
          the scope that owns it, steering around any intervening container rather than through it.
        justification: |
          A cross-container edge belongs to the coordinate space of the container that owns it; routing
          it around the sibling containers between its endpoints keeps the connector unambiguous.
        tests:
          - Apply_CrossContainerEdge_RoutesAroundInterveningContainer

      - id: Rendering-Layout-HierarchicalLayout-Validation
        title: >-
          HierarchicalLayoutAlgorithm shall reject a null graph, null options, or null registry argument
          with an argument-null error.
        justification: |
          Failing fast on null arguments prevents undefined behavior and surfaces caller errors at the
          public algorithm boundary.
        tests:
          - Apply_NullGraph_Throws
          - Apply_NullOptions_Throws
          - Constructor_NullRegistry_Throws

  - title: DefaultLayout Unit Requirements
    requirements:
      - id: Rendering-Layout-DefaultRegistry-BundledAlgorithms
        title: >-
          The default layout-algorithm registry factory shall return a registry from which each of the
          three bundled algorithms — layered, containment, and hierarchical — resolves by its identifier,
          and each call shall return an independently mutable registry.
        justification: |
          A batteries-included factory removes the boilerplate of registering the bundled algorithms by
          hand; returning a fresh, independent registry on every call lets a caller extend or replace an
          algorithm without affecting any other caller.
        tests:
          - CreateDefaultRegistry_ResolvesLayeredAlgorithm
          - CreateDefaultRegistry_ResolvesContainmentAlgorithm
          - CreateDefaultRegistry_ResolvesHierarchicalAlgorithm
          - CreateDefaultRegistry_RegistersOnlyTheThreeBundledAlgorithms
          - CreateDefaultRegistry_ReturnsIndependentInstances

      - id: Rendering-Layout-LayoutEngine-DefaultAlgorithm
        title: >-
          When neither the graph nor the options declares an algorithm, the layout facade shall lay the
          graph out with the hierarchical engine.
        justification: |
          Defaulting to the hierarchical engine lets the single facade lay out both flat and nested
          graphs correctly; the choice is safe because the engine is byte-identical to the leaf algorithm
          for a flat graph, so no existing output changes.
        tests:
          - DefaultAlgorithmId_IsHierarchical
          - Layout_FlatGraphNoAlgorithmDeclared_MatchesLayeredLeafExactly

      - id: Rendering-Layout-LayoutEngine-Resolution
        title: >-
          The layout facade shall resolve the algorithm from an explicit declaration on the graph in
          preference to one on the options, applying the resolved algorithm to the graph.
        justification: |
          Layout options are naturally attached to the graph in the ELK-style model, so a graph-level
          declaration must take precedence over a free-standing options declaration, giving callers a
          predictable single source of truth for algorithm selection.
        tests:
          - Layout_OptionsDeclareLayered_MatchesLayeredAlgorithmExactly
          - Layout_OptionsDeclareContainment_MatchesContainmentAlgorithmExactly
          - Layout_GraphDeclarationOverridesOptions

      - id: Rendering-Layout-LayoutEngine-FlatEquivalence
        title: >-
          For a flat graph, the layout facade shall produce a placed layout tree identical to the
          declared (or defaulted) leaf algorithm applied to the same graph.
        justification: |
          The facade is purely additive: a flat graph must lay out exactly as it would through the leaf
          algorithm directly, so routing every call through the facade can never change existing output.
        tests:
          - Layout_FlatGraphNoAlgorithmDeclared_MatchesLayeredLeafExactly
          - Layout_OptionsDeclareContainment_MatchesContainmentAlgorithmExactly

      - id: Rendering-Layout-LayoutEngine-NestedComposition
        title: >-
          For a nested graph laid out with the default hierarchical engine, the layout facade shall
          produce a composed tree in which each container box carries its recursively laid-out children.
        justification: |
          The whole point of defaulting to the hierarchical engine is that a nested graph is composed
          correctly from one call; the container box must hold its placed children rather than treating
          the nesting as opaque.
        tests:
          - Layout_NestedGraphNoAlgorithmDeclared_ProducesComposedTree

      - id: Rendering-Layout-LayoutEngine-CustomRegistry
        title: >-
          The layout facade shall resolve the declared algorithm from a caller-supplied registry when one
          is provided, and surface a lookup error when the declared algorithm is not registered.
        justification: |
          Callers that register custom algorithms must be able to lay out through the same facade;
          resolving against their registry and failing clearly on an unknown identifier keeps algorithm
          selection open and its errors diagnosable.
        tests:
          - Layout_CustomRegistry_ResolvesRegisteredAlgorithm
          - Layout_UnregisteredAlgorithm_Throws

      - id: Rendering-Layout-LayoutEngine-Validation
        title: >-
          The layout facade shall reject a null graph, null options, or null registry argument with an
          argument-null error.
        justification: |
          Failing fast on null arguments prevents undefined behavior and surfaces caller errors at the
          public facade boundary.
        tests:
          - Layout_NullGraph_Throws
          - Layout_NullOptions_Throws
          - Layout_NullRegistry_Throws
