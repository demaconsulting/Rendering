---
# DemaConsulting.Rendering.Layout - LayeredLayoutAlgorithm Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the layered-layout-algorithm unit.
# - This file is part of the split Rendering.Layout requirements set.

sections:
  - title: LayeredLayoutAlgorithm Requirements
    requirements:
      - id: Rendering-Layout-LayeredAlgorithm-Identity
        title: >-
          LayeredLayoutAlgorithm shall expose the stable identifier under which it is selected and
          registered.
        justification: |
          Renderers and registries select an algorithm by its identifier; a stable, well-known value
          lets the layered algorithm be resolved by name.
        tests:
          - Id_IsLayered

      - id: Rendering-Layout-LayeredAlgorithm-PlacesAndRoutes
        title: >-
          LayeredLayoutAlgorithm shall convert a layout graph into a placed layout tree with one box
          per node and one orthogonally routed connector per edge.
        justification: |
          The algorithm is the public bridge from an abstract graph to concrete geometry; every node
          must become a placed box and every edge a routed connector for renderers to draw.
        tests:
          - Apply_ChainGraph_PlacesLayeredBoxesAndRoutesEdges

      - id: Rendering-Layout-LayeredAlgorithm-EmptyGraph
        title: >-
          When given a graph with no nodes, LayeredLayoutAlgorithm shall return an empty placed
          layout tree.
        justification: |
          An empty graph is a valid degenerate case that must yield a well-formed empty canvas rather
          than an error.
        tests:
          - Apply_EmptyGraph_ReturnsEmptyCanvas

      - id: Rendering-Layout-LayeredAlgorithm-Direction
        title: >-
          LayeredLayoutAlgorithm shall arrange the placed layers along the flow direction selected by
          the direction option — top-to-bottom, bottom-to-top, right-to-left, or the default
          left-to-right — reading the selection from the graph in preference to the options.
        justification: |
          Directed views such as action flows and state machines read the placed coordinates expecting
          the layers to progress top-to-bottom; the layout is only correct for them when the algorithm
          honors the requested flow direction rather than always flowing left-to-right.
        tests:
          - Apply_DownDirection_FlowsTopToBottom
          - Apply_DownDirection_DiffersFromRight
          - Apply_DownDirectionOnGraphScope_IsHonored
          - Apply_DefaultDirection_FlowsLeftToRight

      - id: Rendering-Layout-LayeredAlgorithm-NodeSpacing
        title: >-
          LayeredLayoutAlgorithm shall use the node-spacing option to control the minimum gap between
          same-layer nodes, reading the selection from the graph in preference to the options and
          falling back to the property default, which matches the engine's original fixed constant.
        justification: |
          CoreOptions.NodeSpacing previously cascaded correctly but was never read by any bundled
          algorithm, so a caller's requested spacing had no observable effect on the placed layout.
          Honoring it lets callers widen or narrow the gap between sibling nodes without altering the
          default rendering of any existing diagram, since the property's default now matches the
          engine's pre-existing fixed constant.
        tests:
          - Apply_DefaultNodeSpacing_MatchesPriorEngineBehavior
          - Apply_LargerNodeSpacing_WidensGapBetweenSiblings
          - Apply_NodeSpacingOnGraphScope_TakesPrecedenceOverOptions

      - id: Rendering-Layout-LayeredAlgorithm-Validation
        title: >-
          LayeredLayoutAlgorithm shall reject a null graph or null options argument with an
          argument-null error.
        justification: |
          Failing fast on null arguments prevents undefined behavior and surfaces caller errors at the
          public boundary.
        tests:
          - Apply_NullGraph_Throws
          - Apply_NullOptions_Throws

      - id: Rendering-Layout-LayeredAlgorithm-MergeParallelEdges
        title: >-
          LayeredLayoutAlgorithm shall honor CoreOptions.MergeParallelEdges (reading the graph in
          preference to the options, default true): when true, every input edge sharing a directed
          node pair collapses to exactly one emitted LayoutLine (using the first surviving edge's
          label and discarding the rest); when false, every parallel edge instance is retained as its
          own independently-routed LayoutLine.
        justification: |
          A physical wiring/interconnection diagram (for example separate power, encoder, and sensor
          connectors between the same two components) needs every distinct connector to render as its
          own labeled line; the algorithm previously emitted one LayoutLine per original input edge
          regardless of duplication, stacking every duplicate edge's label on the same drawn line
          rather than collapsing to a single line as intended when merging is left at its default.
        tests:
          - Apply_ParallelEdges_MergeParallelEdgesDefaultTrue_EmitsExactlyOneLine
          - Apply_ParallelEdges_MergeParallelEdgesFalse_RetainsEveryEdge
          - Apply_MergeParallelEdges_GraphOverridesOptions

      - id: Rendering-Layout-LayeredAlgorithm-PortEmission
        title: >-
          When an edge endpoint is a LayoutGraphPort, LayeredLayoutAlgorithm shall emit a LayoutPort
          at the routed connector's resolved anchor coordinate, carrying the port's ExternalLabel as
          its label.
        justification: |
          A named port is meaningless without a placed, labeled anchor for a renderer to draw; emitting
          a LayoutPort at the exact coordinate the corridor router already resolved for that connector
          keeps the port glyph and connector endpoint visually coincident.
        tests:
          - Apply_EdgeWithPortEndpoint_EmitsLayoutPortWithExternalLabel

      - id: Rendering-Layout-LayeredAlgorithm-ContentInset
        title: >-
          LayeredLayoutAlgorithm shall auto-compute each placed box's ContentInsetLeft/Right (the
          widest same-side port label's measured width, via CoreOptions.TextMeasurer/AssumedFontSize,
          plus a small clearance) and ContentInsetTop/Bottom (a flat fixed height for one text line at
          AssumedFontSize plus padding), zero on any side with no ports, using a caller-supplied
          CoreOptions.TextMeasurer when configured in preference to a dependency-free heuristic.
        justification: |
          A rendered port label needs a reserved margin on its owning box's face so it never collides
          with that box's own title/compartment content; computing the margin at layout time (rather
          than leaving it to each renderer) keeps a single LayoutTree correct for every renderer that
          consumes it, per the single-layout/multi-renderer design.
        tests:
          - Apply_NodeWithLeftPort_ComputesNonZeroContentInsetLeft
          - Apply_CustomTextMeasurer_IsUsedToSizePortLabelInset

      - id: Rendering-Layout-LayeredAlgorithm-ShapeAwareRouting
        title: >-
          LayeredLayoutAlgorithm shall project a same-scope connector's endpoint onto a shaped node's
          real outline and shall exclude the shape's non-connectable face regions from candidate
          endpoints, matching ConnectorRouter's shape-geometry rules for the node's BoxShape.
        justification: |
          A node's Shape previously only affected the rendered outline of the placed box; the routed
          connector endpoint still landed on the plain bounding-box face regardless of BoxShape, which
          looked visually inconsistent with an equivalent cross-container edge routed by
          ConnectorRouter (for example a BoxShape.Folder package's connector floating above the
          recessed body instead of touching it). This is genuinely new, observable behavior of the
          public algorithm output, not merely an internal pipeline-stage detail.
        tests:
          - Apply_DownDirection_FolderTarget_ProjectsEndpointToRecessedTop
          - Apply_UpDirection_FolderSource_ProjectsEndpointToRecessedTop
          - Apply_RightDirection_FolderTarget_LeftFaceUnaffectedByTab
          - Apply_LeftDirection_FolderTarget_RightFaceUnaffectedByTab
          - Apply_DownDirection_NoteTarget_ExcludesFoldFromLandingZone
          - Apply_RectangleChain_MatchesPreShapeAwarenessOutput
