---
# DemaConsulting.Rendering.Layout - HierarchicalLayoutAlgorithm Unit Requirements
#
# PURPOSE:
# - Unit-level requirements for the hierarchical-layout-algorithm unit.
# - This file is part of the split Rendering.Layout requirements set.

sections:
  - title: HierarchicalLayoutAlgorithm Requirements
    requirements:
      - id: Rendering-Layout-HierarchicalLayout-Identity
        title: >-
          HierarchicalLayoutAlgorithm shall expose the stable identifier under which it is selected and
          registered.
        justification: |
          Renderers and registries select an algorithm by its identifier; a stable, well-known value
          lets the hierarchical engine be resolved by name alongside the leaf algorithms.
        tests:
          - Id_IsHierarchical

      - id: Rendering-Layout-HierarchicalLayout-FlatEquivalence
        title: >-
          When given a graph in which no node is a container, HierarchicalLayoutAlgorithm shall produce
          a placed layout tree identical to the selected leaf algorithm applied to the same graph.
        justification: |
          The engine is purely additive: a flat graph must lay out exactly as it did before the
          hierarchical engine existed, so selecting the engine can never change any existing output.
        tests:
          - Apply_FlatRandomGraphs_MatchLayeredAlgorithmExactly
          - Apply_FlatRandomGraphs_MatchContainmentAlgorithmExactly

      - id: Rendering-Layout-HierarchicalLayout-NestsChildren
        title: >-
          HierarchicalLayoutAlgorithm shall place a container node's children within that container's
          bounds and size the container to enclose them.
        justification: |
          Nested content is only meaningful when it renders inside its container; sizing each container
          to its children and positioning the children within its bounds is the engine's core behavior.
        tests:
          - Apply_TwoLevelNesting_SizesContainerAndNestsChildrenAbsolutely
          - Apply_ThreeLevelNesting_Succeeds
          - HierarchicalLayoutAlgorithm_ThreeLevelChain_InnermostContainerGrows_GrowthCascadesThroughEveryEnclosingLevel

      - id: Rendering-Layout-HierarchicalLayout-PerNodeAlgorithm
        title: >-
          HierarchicalLayoutAlgorithm shall lay out each scope with the algorithm selected on that scope,
          allowing a container to be arranged by a different algorithm than its parent.
        justification: |
          Different levels of a diagram suit different arrangements; letting each container select its
          own algorithm — inheriting the parent's when unset — lets, for example, a packed container hold
          a layered one without either level knowing about the other.
        tests:
          - Apply_ContainmentRootWithLayeredContainer_Composes
          - Apply_LayeredRootWithContainmentContainer_Composes

      - id: Rendering-Layout-HierarchicalLayout-HierarchyHandling
        title: >-
          HierarchicalLayoutAlgorithm shall lay out each container's children in their own coordinate
          space and compose them into the parent at absolute coordinates.
        justification: |
          Laying out each container independently and then composing it into its parent keeps container
          placements deterministic and lets sub-layouts be reused as self-contained regions, mirroring
          the separate-children hierarchy-handling mode.
        tests:
          - Apply_TwoLevelNesting_SizesContainerAndNestsChildrenAbsolutely
          - Apply_CompoundGraph_DoesNotMutateInputNodeSizes
          - HierarchicalLayoutAlgorithm_NoBoundaryPortHierarchy_OutputIsByteIdenticalBeforeAndAfterChange

      - id: Rendering-Layout-HierarchicalLayout-CrossContainerEdge
        title: >-
          HierarchicalLayoutAlgorithm shall route an edge whose endpoints live in different containers at
          the scope that owns it, steering around any intervening container rather than through it.
        justification: |
          A cross-container edge belongs to the coordinate space of the container that owns it; routing
          it around the sibling containers between its endpoints keeps the connector unambiguous.
        tests:
          - Apply_CrossContainerEdge_RoutesAroundInterveningContainer

      - id: Rendering-Layout-HierarchicalLayout-SiblingContainerGapWidening
        title: >-
          On the no-boundary-port placement path, HierarchicalLayoutAlgorithm shall widen the horizontal
          gap between two horizontally-adjacent sibling containers to the connector-corridor width for the
          number of cross-container edges routed between them.
        justification: |
          Cross-container edges never appear in the per-scope sized view the leaf algorithm lays out, so
          the leaf alone cannot reserve room for a fan of them between two sibling containers. A
          post-placement pass over the composed boxes, reusing the shared corridor-width formula
          (EdgeCountGapWidener), widens only the horizontal gap of a genuinely side-by-side pair so the
          connectors get distinct lanes.
        tests:
          - Apply_SiblingContainersWithEightCrossEdges_WidensGapToCorridorWidth

      - id: Rendering-Layout-HierarchicalLayout-SiblingContainerGapWideningSingleEdgeUnaffected
        title: >-
          The sibling-container gap widening shall leave a pair joined by zero or one cross-container
          edge byte-identical to its prior placement.
        justification: |
          Gating the widening pass on more than one edge keeps every existing single-edge and no-edge
          scope byte-identical to its behavior before the widening feature existed, since a lone
          connector never needed a widened corridor.
        tests:
          - Apply_SiblingContainersWithSingleCrossEdge_LeavesGapUnwidened

      - id: Rendering-Layout-HierarchicalLayout-SiblingGapWideningPortPathUnaffected
        title: >-
          The sibling-container gap widening pass shall leave the boundary-port combined-pass path
          unchanged, including the resolved shared anchor for parallel boundary-port approaches.
        justification: |
          The boundary-port combined recursive pass produces its geometry from a different pipeline
          (the merge-region assembly and decomposition) than the no-boundary-port placement path the
          widening pass runs on; confining the widening pass to the no-boundary-port branch keeps the
          combined pass, and the anchors it resolves, untouched.
        tests:
          - Apply_BoundaryPortWithParallelApproaches_ResolvesToOneSharedAnchorUnaffectedByWidening
          - HierarchicalLayoutAlgorithm_NoBoundaryPortHierarchy_OutputIsByteIdenticalBeforeAndAfterChange

      - id: Rendering-Layout-HierarchicalLayout-CascadesOptions
        title: >-
          HierarchicalLayoutAlgorithm shall resolve a CoreOptions property for a scope by walking to the
          nearest ancestor scope with an explicit override, falling back to the property's own default
          only when no scope in the chain declares one.
        justification: |
          A leaf algorithm reads a CoreOptions property from the options it is given, in preference to
          the shared root options. Without a per-scope cascade, a caller-supplied override on a nested
          container would be silently dropped and the container would fall back to the parent options'
          value (or the property default) instead.
        tests:
          - Apply_ContainerWithDirectionOverride_HonorsNestedDirection
          - Apply_ThreeLevelDirectionCascade_InheritsThroughUnsetMiddleLevel
          - Apply_ThreeLevelDirectionCascade_MidLevelOverrideTakesPrecedence

      - id: Rendering-Layout-HierarchicalLayout-CascadesAllProperties
        title: >-
          HierarchicalLayoutAlgorithm shall generalize the per-scope cascade to every CoreOptions
          property (Algorithm, Direction, EdgeRouting, HierarchyHandling, NodeSpacing, LayerSpacing), not
          only Direction, reaching every leaf-algorithm call at every nesting level.
        justification: |
          Generalizing the cascade mechanism (via PropertyHolder.OverlayOnto) fixes the ancestor-override
          resolution for all six properties at once rather than one at a time — previously the cascade
          existed only for Algorithm, so a nested EdgeRouting (or other property) override was silently
          dropped even though a nested Direction override already worked correctly.
        tests:
          - Apply_ThreeLevelEdgeRoutingCascade_ReachesEveryLeafAlgorithmCall

      - id: Rendering-Layout-HierarchicalLayout-HonorsScopeEdgeRouting
        title: >-
          HierarchicalLayoutAlgorithm shall route a cross-container edge using the owning scope's
          cascaded EdgeRouting value, honoring an explicit override set on that scope's own graph.
        justification: |
          Previously RouteCrossContainerEdges read CoreOptions.EdgeRouting directly from the root
          options, ignoring any override set on the owning scope's own graph — a genuine,
          previously-undocumented defect with zero observable effect until fixed, since the cascaded
          effective snapshot now reaches this method instead.
        tests:
          - Apply_CrossContainerEdge_HonorsScopeEdgeRoutingOverride

      - id: Rendering-Layout-HierarchicalLayout-SameScopePortEdges
        title: >-
          HierarchicalLayoutAlgorithm shall route a same-scope edge whose endpoint is a named
          LayoutGraphPort through the selected leaf algorithm exactly as a flat (container-free) graph
          would, even when the scope also contains an unrelated container node.
        justification: |
          Previously ClassifyEdges unconditionally skipped (silently dropped) any edge touching a
          LayoutGraphPort the instant the scope contained any container node at all — a
          previously-undocumented defect, now fixed — regardless of whether the port edge actually
          crossed a container boundary. A port edge whose direct-member endpoints are both literal,
          non-nested members of the scope does not cross any boundary and must reach the leaf algorithm,
          which already resolves a LayoutGraphPort endpoint correctly.
        tests:
          - Apply_SameScopePortEdge_WithUnrelatedContainerElsewhere_RoutesLikePortEdge
          - Apply_NestedContainerPortEdge_TranslatesPortIntoAncestorCoordinates

      - id: Rendering-Layout-HierarchicalLayout-BoundaryPortDelegation
        title: >-
          HierarchicalLayoutAlgorithm shall resolve a container's boundary (delegation) port — a port
          the container both exposes to an external approach edge and references from an edge inside
          its own child scope — to exactly one shared LayoutPort anchor on the container boundary
          carrying both the external and internal labels.
        justification: |
          A boundary/delegation port is the bulkhead-connector pattern: one physical anchor names both
          the connection reaching it from outside the container and the delegation relaying it into the
          container's own children. Consolidating both labels onto a single anchor (rather than emitting
          a separate port per edge) keeps the rendered wiring unambiguous.
        tests:
          - Apply_BoundaryPortWithExternalAndInternalEdges_EmitsOneSharedAnchorCarryingBothLabels

      - id: Rendering-Layout-HierarchicalLayout-BoundaryPortFanMerge
        title: >-
          HierarchicalLayoutAlgorithm shall consolidate every edge converging on a container's boundary
          port — every external approach and every internal delegation edge, under external and internal
          fan-out — onto the single shared anchor for that port rather than emitting a separate anchor
          per edge.
        justification: |
          Emitting a separate port per converging edge would defeat the single-anchor bulkhead-connector
          pattern under fan-out; consolidating fan-out onto one anchor keeps the rendered wiring
          unambiguous regardless of how many edges converge on the boundary port.
        tests:
          - Apply_BoundaryPortFanOut_ResolvesToOneSharedAnchor

      - id: Rendering-Layout-HierarchicalLayout-IndependentBoundaryPorts
        title: >-
          HierarchicalLayoutAlgorithm shall resolve two independent boundary ports on one container to
          two distinct LayoutPort anchors, preserving each anchor's own connector provenance even when
          the two ports share a null or identical external label.
        justification: |
          Two independent boundary ports on the same container name two physically distinct connection
          points; consolidating them onto a single anchor (as fan-out consolidation does for edges of the
          same port) would incorrectly merge unrelated connections, including when their external labels
          happen to be null or identical text.
        tests:
          - Apply_TwoIndependentBoundaryPortsOnOneContainer_EmitsTwoAnchors
          - Apply_TwoIndependentBoundaryPortsWithSharedNullExternalLabel_PreservesConnectorProvenance
          - Apply_TwoIndependentBoundaryPortsWithIdenticalExternalLabel_PreservesConnectorProvenance

      - id: Rendering-Layout-HierarchicalLayout-BoundaryPortOrthogonal
        title: >-
          Every edge converging on a boundary (delegation) port anchor shall be routed through the real
          orthogonal corridor router onto that anchor as an axis-aligned path with no direct diagonal,
          including under external fan-in and through a multi-level delegation chain.
        justification: |
          The container and its children are laid out in one combined recursive layered pass — assembled
          into a merge region, run through the recursive pipeline, and projected back by the
          merge-region decomposer — so every converging edge is routed by the same orthogonal corridor
          router that routes ordinary edges, rather than having an endpoint patched onto the anchor with
          a hand-built diagonal. Routing every converging edge orthogonally through the real router is
          what keeps the external fan-in and the multi-level delegation chain free of the diagonal
          shortcut a post-hoc endpoint reconciliation produced.
        tests:
          - MergeRegionDecomposer_FanIn_EveryConvergingEdge_IsStrictlyOrthogonalWithNoDirectDiagonal
          - MergeRegionDecomposer_FanOut_EveryDelegatedEdge_IsStrictlyOrthogonalWithNoDirectDiagonal
          - HierarchicalLayoutAlgorithm_ThreeLevelDelegationChain_EndToEnd_ProducesConnectedOrthogonalPath

      - id: Rendering-Layout-HierarchicalLayout-BoundaryPortEdgeThrows
        title: >-
          HierarchicalLayoutAlgorithm shall throw NotSupportedException, rather than silently dropping
          the edge, when a named-port edge genuinely crosses a container boundary in a shape the
          boundary-port delegation mechanism does not cover — for example a port owned by a plain
          (non-container) node with an edge straight into a different container's nested child.
        justification: |
          The boundary-port delegation mechanism covers a container's own boundary port delegating into
          its children. A port whose owner has no child scope to delegate into is not a delegation port,
          so it falls through to the box-only ConnectorRouter/Connection cross-container router, which
          has no port concept and cannot anchor or route a port endpoint. Failing loudly with a clear,
          actionable message is safer than silently dropping the edge or anchoring it incorrectly as a
          plain box connector. Broader boundary-crossing port support remains a separate future effort
          (see ROADMAP.md).
        tests:
          - Apply_PortOnNonContainerCrossingIntoDifferentContainer_Throws

      - id: Rendering-Layout-HierarchicalLayout-ValidatesGraph
        title: >-
          HierarchicalLayoutAlgorithm shall reject a null graph argument with an argument-null error.
        justification: |
          Failing fast on a null graph prevents undefined behavior and surfaces caller errors at the
          public algorithm boundary.
        tests:
          - Apply_NullGraph_Throws

      - id: Rendering-Layout-HierarchicalLayout-ValidatesOptions
        title: >-
          HierarchicalLayoutAlgorithm shall reject a null options argument with an argument-null error.
        justification: |
          Failing fast on null options prevents undefined behavior and surfaces caller errors at the
          public algorithm boundary.
        tests:
          - Apply_NullOptions_Throws

      - id: Rendering-Layout-HierarchicalLayout-ValidatesRegistry
        title: >-
          HierarchicalLayoutAlgorithm shall reject a null registry argument with an argument-null error.
        justification: |
          Failing fast on a null registry prevents undefined behavior and surfaces caller errors at the
          construction boundary.
        tests:
          - Constructor_NullRegistry_Throws
