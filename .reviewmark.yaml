---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following hierarchical scope principles.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"                   # Root README file
  - "requirements.yaml"           # Root requirements file
  - "**/*.cs"                     # All C# source and test files
  - "docs/reqstream/**/*.yaml"    # Requirements files
  - "docs/design/**/*.md"         # Design documentation files
  - "docs/verification/**/*.md"   # Verification documentation files
  - "docs/user_guide/**/*.md"     # User guide documentation
  - "!**/obj/**"                  # Exclude build output
  - "!**/bin/**"                  # Exclude build output
  - "!node_modules/**"            # Exclude npm dependencies
  - "!**/.venv/**"                # Exclude Python virtual environment

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/Rendering/reviews/index.json

# Review sets following hierarchical scope principles.
# Each review-set focuses on a single compliance question with manageable file counts.
reviews:
  # Purpose
  - id: Purpose
    title: Review of user-facing capabilities and system promises
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"
      - "docs/design/introduction.md"
      - "docs/verification/introduction.md"

  # All requirements quality and traceability
  - id: Rendering-AllRequirements
    title: Review of Rendering requirements quality and traceability
    paths:
      - "requirements.yaml"
      - "docs/reqstream/rendering/**/*.yaml"
      - "docs/reqstream/rendering-abstractions/**/*.yaml"
      - "docs/reqstream/rendering-layout/**/*.yaml"
      - "docs/reqstream/rendering-svg/**/*.yaml"
      - "docs/reqstream/rendering-skia/**/*.yaml"
      - "docs/reqstream/ots/*.yaml"

  # Rendering (Model) system
  - id: Rendering-Model
    title: Review of the Rendering model - IR, property system, and input graph
    paths:
      - "docs/reqstream/rendering/rendering.yaml"
      - "docs/reqstream/rendering/platform-requirements.yaml"
      - "docs/design/rendering/**/*.md"
      - "docs/verification/rendering/**/*.md"
      - "src/DemaConsulting.Rendering/**/*.cs"
      - "test/DemaConsulting.Rendering.Tests/**/*.cs"

  # Rendering.Abstractions system
  - id: Rendering-Abstractions
    title: Review of the Rendering abstractions - SPI contracts, registries, theme, and metrics
    paths:
      - "docs/reqstream/rendering-abstractions/**/*.yaml"
      - "docs/design/rendering-abstractions/**/*.md"
      - "docs/verification/rendering-abstractions/**/*.md"
      - "src/DemaConsulting.Rendering.Abstractions/**/*.cs"
      - "test/DemaConsulting.Rendering.Abstractions.Tests/**/*.cs"

  # Rendering.Layout system
  - id: Rendering-Layout
    title: Review of the Rendering layout algorithms and layered pipeline
    paths:
      - "docs/reqstream/rendering-layout/**/*.yaml"
      - "docs/design/rendering-layout/**/*.md"
      - "docs/verification/rendering-layout/**/*.md"
      - "src/DemaConsulting.Rendering.Layout/**/*.cs"
      - "test/DemaConsulting.Rendering.Layout.Tests/**/*.cs"

  # Rendering.Svg system
  - id: Rendering-Svg
    title: Review of the SVG renderer
    paths:
      - "docs/reqstream/rendering-svg/**/*.yaml"
      - "docs/design/rendering-svg/**/*.md"
      - "docs/verification/rendering-svg/**/*.md"
      - "src/DemaConsulting.Rendering.Svg/**/*.cs"
      - "test/DemaConsulting.Rendering.Svg.Tests/**/*.cs"

  # Rendering.Png system
  - id: rendering-skia
    title: Review of the PNG renderer
    paths:
      - "docs/reqstream/rendering-skia/**/*.yaml"
      - "docs/design/rendering-skia/**/*.md"
      - "docs/verification/rendering-skia/**/*.md"
      - "src/DemaConsulting.Rendering.Png/**/*.cs"
      - "test/DemaConsulting.Rendering.Png.Tests/**/*.cs"

  # OTS Items
  - id: OTS-BuildMark
    title: Review of BuildMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/buildmark.yaml"
      - "docs/verification/ots/buildmark.md"

  - id: OTS-FileAssert
    title: Review of FileAssert OTS verification evidence
    paths:
      - "docs/reqstream/ots/fileassert.yaml"
      - "docs/verification/ots/fileassert.md"

  - id: OTS-Pandoc
    title: Review of Pandoc OTS verification evidence
    paths:
      - "docs/reqstream/ots/pandoc.yaml"
      - "docs/verification/ots/pandoc.md"

  - id: OTS-ReqStream
    title: Review of ReqStream OTS verification evidence
    paths:
      - "docs/reqstream/ots/reqstream.yaml"
      - "docs/verification/ots/reqstream.md"

  - id: OTS-ReviewMark
    title: Review of ReviewMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/reviewmark.yaml"
      - "docs/verification/ots/reviewmark.md"

  - id: OTS-SarifMark
    title: Review of SarifMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/sarifmark.yaml"
      - "docs/verification/ots/sarifmark.md"

  - id: OTS-SonarMark
    title: Review of SonarMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/sonarmark.yaml"
      - "docs/verification/ots/sonarmark.md"

  - id: OTS-VersionMark
    title: Review of VersionMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/versionmark.yaml"
      - "docs/verification/ots/versionmark.md"

  - id: OTS-WeasyPrint
    title: Review of WeasyPrint OTS verification evidence
    paths:
      - "docs/reqstream/ots/weasyprint.yaml"
      - "docs/verification/ots/weasyprint.md"

  - id: OTS-xUnit
    title: Review of xUnit OTS verification evidence
    paths:
      - "docs/reqstream/ots/xunit.yaml"
      - "docs/verification/ots/xunit.md"
