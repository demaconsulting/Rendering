---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: "0.2"
language: en

# Project-specific technical terms and tool names
words:
  - buildmark
  - DEMA
  - Dema
  - FileAssert
  - fileassert
  - xunit
  - Pandoc
  - Qube
  - reqstream
  - reviewmark
  - Sarif
  - SARIF
  - sarifmark
  - sonarmark
  - versionmark
  - Weasy
  - WeasyPrint
  - weasyprint
  - netstandard
  - yamlfix
  # Rendering library technical terms and referenced code identifiers
  - Skia
  - SkiaSharp
  - Noto
  - webp
  - rasterizer
  - rasterizes
  - Sugiyama
  - Brandes
  - Kopf
  - Hanan
  - Precomputes
  - subfolders
  - Rects
  - Premul
  - dasharray
  - RRGGBB
  - RRGGBBAA
  - vdir
  - hdir
  - posis
  - longedge
  - selfloop
  - facade
  # Non-ASCII terms retained verbatim in extracted source comments
  - façade
  - Köpf
  # DEMA documentation spelling conventions (shared with sibling repositories)
  - behaviour
  - colour
  - colours
  - initialised

# Exclude common build artifacts, dependencies, and vendored third-party code
ignorePaths:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/thirdparty/**"
  - "**/third-party/**"
  - "**/3rd-party/**"
  - "**/generated/**"
  - "**/AGENT_REPORT_*.md"
  - "**/.agent-logs/**"
  - "**/bin/**"
  - "**/obj/**"
  - package-lock.json
